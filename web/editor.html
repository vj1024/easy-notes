<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyNotes</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/themes/default/style.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/vditor@3.11.2/dist/index.css"/>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .tree-container {
            width: 10%;
            min-width: 200px;
            max-width: 50%;
            height: 100%;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .resize-handle {
            width: 4px;
            height: 100%;
            background: #ddd;
            cursor: col-resize;
            position: absolute;
            right: -2px;
            top: 0;
            z-index: 10;
            transition: background-color 0.2s;
        }

        .resize-handle:hover {
            background: #4CAF50;
        }

        .resize-handle.active {
            background: #2E7D32;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        .search-box input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .editor-container {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            min-width: 400px;
        }

        .file-info-bar {
            padding: 10px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            color: #666;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #vditor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            padding: 8px 10px;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #666;
            text-align: right;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            color: #d32f2f;
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
            margin: 10px 0;
        }

        .no-file-selected {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            font-size: 16px;
        }

        .search-stats {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }

        #vditor {
            height: 100% !important;
        }

        .unauthorized {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
        }

        .unauthorized-message {
            color: #d32f2f;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .login-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .login-button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="tree-container" id="tree-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="жҗңзҙўж–Үд»¶...">
            <div class="search-stats" id="search-stats"></div>
        </div>
        <div id="file-tree">
            <div class="loading">еҠ иҪҪж–Үд»¶ж ‘...</div>
        </div>
        <div class="resize-handle" id="resize-handle"></div>
    </div>

    <div class="editor-container">
        <div class="file-info-bar" id="file-info-bar">
            <div>
                <span id="file-title">жңӘйҖүжӢ©ж–Үд»¶</span>
            </div>
        </div>
        <div class="editor-content">
            <div id="vditor-container">
                <div class="no-file-selected">иҜ·д»Һе·Ұдҫ§йҖүжӢ©ж–Үд»¶иҝӣиЎҢзј–иҫ‘</div>
            </div>
        </div>
        <div class="status-bar" id="status-bar">
            <div>е°ұз»Ә</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/jstree.min.js"></script>
<script src="https://unpkg.com/vditor@3.11.2/dist/index.min.js"></script>
<script>
    $(function () {
        const BASE_URL = ""
        let currentSearchTerm = '';
        let searchTimeout = null;
        let vditor = null;
        let currentFile = null;
        let saveInterval = null;
        let isDirty = false;
        let lastSaveTime = null;
        let isResizing = false;

        // еҲқе§ӢеҢ–жӢ–еҠЁи°ғж•ҙеӨ§е°ҸеҠҹиғҪ
        initResizeHandler();

        // жЈҖжҹҘи®ӨиҜҒзҠ¶жҖҒ
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                redirectToLogin();
                return false;
            }
            return true;
        }

        // и·іиҪ¬еҲ°зҷ»еҪ•йЎө
        function redirectToLogin() {
            window.location.href = '/login';
        }

        // еӨ„зҗҶ401й”ҷиҜҜ
        function handleUnauthorized() {
            // жё…з©әtoken
            localStorage.removeItem('token');

            // жҳҫзӨәжңӘжҺҲжқғжҸҗзӨә
            $('#vditor-container').html(`
                    <div class="unauthorized">
                        <div class="unauthorized-message">зҷ»еҪ•е·ІиҝҮжңҹпјҢиҜ·йҮҚж–°зҷ»еҪ•</div>
                        <button class="login-button" id="login-button">еүҚеҫҖзҷ»еҪ•</button>
                    </div>
                `);

            // з»‘е®ҡзҷ»еҪ•жҢүй’®дәӢд»¶
            $('#login-button').on('click', function () {
                redirectToLogin();
            });

            // зҰҒз”Ёзј–иҫ‘еҷЁеҠҹиғҪ
            if (vditor) {
                vditor.destroy();
                vditor = null;
            }

            // жё…йҷӨеҪ“еүҚж–Үд»¶зҠ¶жҖҒ
            currentFile = null;
            isDirty = false;

            // 2з§’еҗҺиҮӘеҠЁи·іиҪ¬
            setTimeout(redirectToLogin, 2000);
        }

        // иҺ·еҸ–и®ӨиҜҒеӨҙ
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return token ? {
                'Authorization': 'Bearer ' + token
            } : {};
        }

        // еёҰи®ӨиҜҒзҡ„AJAXиҜ·жұӮ
        function authAjax(options) {
            // жЈҖжҹҘи®ӨиҜҒзҠ¶жҖҒ
            if (!checkAuth()) {
                return Promise.reject('жңӘи®ӨиҜҒ');
            }

            const token = localStorage.getItem('token');
            options.headers = options.headers || {};
            if (token) {
                options.headers['Authorization'] = 'Bearer ' + token;
            }

            return new Promise((resolve, reject) => {
                $.ajax({
                    ...options,
                    statusCode: {
                        401: function () {
                            handleUnauthorized();
                            reject('жңӘжҺҲжқғ');
                        }
                    },
                    success: function (data, textStatus, jqXHR) {
                        resolve(data, textStatus, jqXHR);
                    },
                    error: function (jqXHR, textStatus, errorThrown) {
                        if (jqXHR.status === 401) {
                            handleUnauthorized();
                        }
                        reject(jqXHR, textStatus, errorThrown);
                    }
                });
            });
        }

        // жӣҙж–°жҗңзҙўз»ҹи®ЎдҝЎжҒҜ
        function updateSearchStats(count) {
            if (currentSearchTerm.length === 0) {
                $('#search-stats').text('');
            } else {
                $('#search-stats').text(`жүҫеҲ° ${count} дёӘеҢ№й…ҚйЎ№`);
            }
        }

        // еҲқе§ӢеҢ–jstree
        const tree = $('#file-tree').jstree({
            'core': {
                'data': function (obj, callback) {
                    if (currentSearchTerm) {
                        // еҰӮжһңжңүжҗңзҙўиҜҚпјҢдҪҝз”ЁжҗңзҙўAPI
                        authAjax({
                            url: BASE_URL + '/api/files',
                            method: 'GET',
                            data: { search: currentSearchTerm },
                            dataType: 'json'
                        })
                        .then(function (data) {
                            if (data.results) {
                                // дҪҝз”Ёжҗңзҙўз»“жһң
                                callback.call(this, data.results);
                                // жӣҙж–°жҗңзҙўз»ҹи®ЎдҝЎжҒҜ
                                updateSearchStats(data.results.length);

                                // еңЁж•°жҚ®еҠ иҪҪе®ҢжҲҗеҗҺеұ•ејҖжүҖжңүиҠӮзӮ№
                                setTimeout(function() {
                                    tree.jstree(true).open_all();
                                }, 100);
                            } else {
                                callback.call(this, []);
                                updateSearchStats(0);
                            }
                        })
                        .catch(function (error) {
                            if (error !== 'жңӘжҺҲжқғ' && error.status !== 401) {
                                console.error('жҗңзҙўеӨұиҙҘ:', error);
                                callback.call(this, []);
                                updateSearchStats(0);
                            }
                        });
                    } else {
                        // еҗҰеҲҷдҪҝз”ЁжӯЈеёёзҡ„ж–Үд»¶еҲ—иЎЁAPI
                        authAjax({
                            url: BASE_URL + '/api/files?list=true',
                            method: 'GET',
                            dataType: 'json'
                        })
                        .then(function (data) {
                            callback.call(this, data);
                            // еҪ“дёҚжҳҜжҗңзҙўжЁЎејҸж—¶пјҢжё…з©әжҗңзҙўз»ҹи®Ў
                            if (currentSearchTerm === '') {
                                $('#search-stats').text('');
                            }
                        })
                        .catch(function (error) {
                            if (error !== 'жңӘжҺҲжқғ' && error.status !== 401) {
                                console.error('еҠ иҪҪж–Үд»¶еҲ—иЎЁеӨұиҙҘ:', error);
                                callback.call(this, []);
                            }
                        });
                    }
                },
                'themes': {
                    'responsive': true,
                    'dots': true,
                    'icons': true
                },
                'error': function (xhr, status, error) {
                    if (xhr.status === 401) {
                        handleUnauthorized();
                    } else {
                        $('#file-tree').html('<div class="error">еҠ иҪҪж–Үд»¶еҲ—иЎЁеӨұиҙҘ: ' + error + '</div>');
                    }
                }
            },
            'plugins': ['types'],
            'types': {
                'default': {
                    'icon': 'jstree-folder'
                },
                'file': {
                    'icon': 'jstree-file'
                }
            }
        });

        // жҗңзҙўеҠҹиғҪ
        $('#search-input').on('input', function () {
            const searchTerm = $(this).val().trim();
            currentSearchTerm = searchTerm;

            clearTimeout(searchTimeout);

            if (searchTerm.length > 0 && searchTerm.length < 2) {
                $('#search-stats').text('иҜ·иҫ“е…ҘиҮіе°‘2дёӘеӯ—з¬Ұ');
                return;
            }

            // е»¶иҝҹжү§иЎҢжҗңзҙўпјҢйҒҝе…Қйў‘з№ҒиҜ·жұӮ
            searchTimeout = setTimeout(() => {
                // йҮҚж–°еҠ иҪҪж ‘д»Ҙеә”з”ЁжҗңзҙўжқЎд»¶
                tree.jstree(true).refresh();

                if (searchTerm.length === 0) {
                    $('#search-stats').text('');
                } else {
                    $('#search-stats').text('жҗңзҙўдёӯ...');
                }
            }, 300);
        });

        // еӨ„зҗҶиҠӮзӮ№зӮ№еҮ»дәӢд»¶
        tree.on('select_node.jstree', function (e, data) {
            const node = data.node;

            if (node.type === 'file') {
                loadFileForEditing(node);
            } else {
                // еҜ№дәҺжҗңзҙўз»“жһңпјҢжҲ‘д»¬еҸӘеӨ„зҗҶж–Үд»¶пјҢдёҚеӨ„зҗҶж–Үд»¶еӨ№
                if (node.path) {
                    // иҝҷжҳҜдёҖдёӘжҗңзҙўз»“жһңиҠӮзӮ№пјҢзӣҙжҺҘеҠ иҪҪж–Үд»¶
                    loadFileByPath(node.path, node.text);
                } else {
                    const filePath = buildFilePath(node);
                    $('#file-title').text(`ж–Үд»¶еӨ№: ${filePath}`);
                    $('#vditor-container').html('<div class="no-file-selected">иҜ·йҖүжӢ©ж–Үд»¶иҝӣиЎҢзј–иҫ‘</div>');
                    if (vditor) {
                        vditor.destroy();
                        vditor = null;
                    }
                    clearSaveInterval();
                    currentFile = null;
                    isDirty = false;
                }
            }
        });

        // еҠ иҪҪж–Үд»¶еҲ°зј–иҫ‘еҷЁ
        function loadFileForEditing(node) {
            if (!checkAuth()) return;

            if (isDirty && currentFile && vditor) {
                if (confirm('еҪ“еүҚж–Үд»¶жңүжңӘдҝқеӯҳзҡ„жӣҙж”№пјҢжҳҜеҗҰе…Ҳдҝқеӯҳпјҹ')) {
                    saveCurrentFile().then(() => {
                        loadNewFile(node);
                    }).catch(() => {
                        loadNewFile(node);
                    });
                } else {
                    loadNewFile(node);
                }
            } else {
                loadNewFile(node);
            }
        }

        // ж №жҚ®и·Ҝеҫ„еҠ иҪҪж–Үд»¶
        function loadFileByPath(filePath, fileName) {
            if (!checkAuth()) return;

            if (isDirty && currentFile && vditor) {
                if (confirm('еҪ“еүҚж–Үд»¶жңүжңӘдҝқеӯҳзҡ„жӣҙж”№пјҢжҳҜеҗҰе…Ҳдҝқеӯҳпјҹ')) {
                    saveCurrentFile().then(() => {
                        loadNewFileByPath(filePath, fileName);
                    }).catch(() => {
                        loadNewFileByPath(filePath, fileName);
                    });
                } else {
                    loadNewFileByPath(filePath, fileName);
                }
            } else {
                loadNewFileByPath(filePath, fileName);
            }
        }

        // еҠ иҪҪж–°ж–Үд»¶
        function loadNewFile(node) {
            const filePath = buildFilePath(node);

            if (!filePath) {
                $('#vditor-container').html('<div class="error">ж— жі•жһ„е»әж–Үд»¶и·Ҝеҫ„</div>');
                return;
            }

            $('#file-title').text(`зј–иҫ‘ж–Үд»¶: ${filePath}`);
            $('#vditor-container').html('<div class="loading">еҠ иҪҪж–Үд»¶еҶ…е®№...</div>');
            $('#status-bar div:last-child').text('еҠ иҪҪдёӯ...');

            const url = BASE_URL + `/api/files/${filePath}`;

            authAjax({
                url: url,
                method: 'GET',
                dataType: 'text'
            }).then(function (content) {
                currentFile = {
                    id: node.id,
                    name: node.text,
                    path: filePath
                };

                initEditor(content);
                $('#status-bar div:last-child').text('е°ұз»Ә');
                isDirty = false;
            }).catch(function (error) {
                if (error.status !== 401) { // 401й”ҷиҜҜе·Із»ҸеңЁauthAjaxдёӯеӨ„зҗҶ
                    $('#vditor-container').html(
                        '<div class="error">еҠ иҪҪж–Үд»¶еӨұиҙҘ: ' + (error.responseText || error.statusText || 'жңӘзҹҘй”ҷиҜҜ') + '</div>'
                    );
                    $('#status-bar div:last-child').text('еҠ иҪҪеӨұиҙҘ');
                }
            });
        }

        // ж №жҚ®и·Ҝеҫ„еҠ иҪҪж–°ж–Үд»¶
        function loadNewFileByPath(filePath, fileName) {
            $('#file-title').text(`зј–иҫ‘ж–Үд»¶: ${filePath}`);
            $('#vditor-container').html('<div class="loading">еҠ иҪҪж–Үд»¶еҶ…е®№...</div>');
            $('#status-bar div:last-child').text('еҠ иҪҪдёӯ...');

            const url = BASE_URL + `/api/files/${filePath}`;

            authAjax({
                url: url,
                method: 'GET',
                dataType: 'text'
            }).then(function (content) {
                currentFile = {
                    id: 'search-' + filePath,
                    name: fileName,
                    path: filePath
                };

                initEditor(content);
                $('#status-bar div:last-child').text('е°ұз»Ә');
                isDirty = false;
            }).catch(function (error) {
                if (error.status !== 401) { // 401й”ҷиҜҜе·Із»ҸеңЁauthAjaxдёӯеӨ„зҗҶ
                    $('#vditor-container').html(
                        '<div class="error">еҠ иҪҪж–Үд»¶еӨұиҙҘ: ' + (error.responseText || error.statusText || 'жңӘзҹҘй”ҷиҜҜ') + '</div>'
                    );
                    $('#status-bar div:last-child').text('еҠ иҪҪеӨұиҙҘ');
                }
            });
        }

        // жӣҙж–°жҗңзҙўз»ҹи®ЎдҝЎжҒҜ
        function updateSearchStats(count) {
            if (currentSearchTerm.length === 0) {
                $('#search-stats').text('');
            } else {
                $('#search-stats').text(`жүҫеҲ° ${count} дёӘеҢ№й…ҚйЎ№`);
            }
        }

        // жһ„е»әж–Үд»¶и·Ҝеҫ„
        function buildFilePath(node) {
            if (node.id === 'root') {
                return '';
            }

            let pathParts = [];
            let currentNode = node;

            while (currentNode && currentNode.id !== '#' && currentNode.id !== 'root') {
                if (currentNode.text && currentNode.text !== 'root') {
                    pathParts.unshift(currentNode.text);
                }
                if (currentNode.parent && currentNode.parent !== '#') {
                    currentNode = tree.jstree('get_node', currentNode.parent);
                } else {
                    break;
                }
            }

            if (pathParts.length === 0) {
                return node.text;
            }

            return pathParts.join('/');
        }

        // еҲқе§ӢеҢ–Vditorзј–иҫ‘еҷЁ
        function initEditor(content) {
            if (vditor) {
                vditor.destroy();
                vditor = null;
            }

            $('#vditor-container').html('<div id="vditor"></div>');

            vditor = new Vditor('vditor', {
                height: '100%',
                value: content,
                cache: {
                    enable: false,
                },
                placeholder: 'еңЁжӯӨзј–иҫ‘ж–Үд»¶еҶ…е®№...',
                toolbar: [
                    "emoji",
                    "headings",
                    "bold",
                    "italic",
                    "strike",
                    "link",
                    "|",
                    "list",
                    "ordered-list",
                    "check",
                    "outdent",
                    "indent",
                    "|",
                    "quote",
                    "line",
                    "code",
                    "inline-code",
                    "insert-before",
                    "insert-after",
                    "|",
                    "upload",
                    "record",
                    "table",
                    "|",
                    "undo",
                    "redo",
                    "|",
                    "edit-mode",
                    "content-theme",
                    "code-theme",
                    "export",
                    {
                        name: "more",
                        toolbar: [
                            "fullscreen",
                            "both",
                            "preview",
                            "info",
                            "help",
                        ],
                    }
                ],
                "outline": {
                    "enable": true,
                    "position": "right"
                },
                input: function (value) {
                    if (!isDirty) {
                        isDirty = true;
                        $('#status-bar div:last-child').text('е·Ідҝ®ж”№ (жңӘдҝқеӯҳ)');
                    }
                },
                focus: function (value) {
                    startAutoSave();
                },
                blur: function (value) {
                    clearSaveInterval();
                },
                after: function () {
                    startAutoSave();
                }
            });

            isDirty = false;
        }

        // еҗҜеҠЁиҮӘеҠЁдҝқеӯҳ
        function startAutoSave() {
            clearSaveInterval();

            saveInterval = setInterval(function () {
                if (isDirty && currentFile && vditor) {
                    saveCurrentFile();
                }
            }, 3000);
        }

        // жё…йҷӨиҮӘеҠЁдҝқеӯҳе®ҡж—¶еҷЁ
        function clearSaveInterval() {
            if (saveInterval) {
                clearInterval(saveInterval);
                saveInterval = null;
            }
        }

        // дҝқеӯҳеҪ“еүҚж–Үд»¶
        function saveCurrentFile() {
            return new Promise((resolve, reject) => {
                if (!currentFile || !vditor) {
                    reject('жІЎжңүж–Үд»¶еҸҜдҝқеӯҳ');
                    return;
                }

                const content = vditor.getValue();
                $('#status-bar div:last-child').text('дҝқеӯҳдёӯ...');

                const url = BASE_URL + `/api/files/${currentFile.path}`;

                authAjax({
                    url: url,
                    method: 'POST',
                    contentType: 'text/plain',
                    data: content
                }).then(function () {
                    isDirty = false;
                    lastSaveTime = new Date();
                    $('#status-bar div:last-child').text('е·Ідҝқеӯҳ ' + lastSaveTime.toLocaleTimeString());
                    resolve();
                }).catch(function (error) {
                    if (error.status !== 401) { // 401й”ҷиҜҜе·Із»ҸеңЁauthAjaxдёӯеӨ„зҗҶ
                        $('#status-bar div:last-child').text('дҝқеӯҳеӨұиҙҘ: ' + (error.responseText || error.statusText || 'жңӘзҹҘй”ҷиҜҜ'));
                    }
                    reject(error);
                });
            });
        }

        // еҲқе§ӢеҢ–жӢ–еҠЁи°ғж•ҙеӨ§е°ҸеҠҹиғҪ
        function initResizeHandler() {
            const resizeHandle = document.getElementById('resize-handle');
            const treeContainer = document.getElementById('tree-container');
            const mainContainer = document.querySelector('.main-container');
            let startX, startWidth;

            resizeHandle.addEventListener('mousedown', function (e) {
                isResizing = true;
                startX = e.clientX;
                startWidth = parseInt(document.defaultView.getComputedStyle(treeContainer).width, 10);
                resizeHandle.classList.add('active');

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                e.preventDefault();
            });

            function handleMouseMove(e) {
                if (!isResizing) return;

                const width = startWidth + e.clientX - startX;
                const maxWidth = mainContainer.offsetWidth * 0.5;

                if (width >= 200 && width <= maxWidth) {
                    treeContainer.style.width = width + 'px';

                    if (tree) {
                        tree.jstree('redraw');
                    }
                    if (vditor) {
                        setTimeout(() => {
                            vditor.resize();
                        }, 50);
                    }
                }
            }

            function handleMouseUp() {
                isResizing = false;
                resizeHandle.classList.remove('active');
                document.removeEventListener('mousemove', handleMouseMove);
                document.removeEventListener('mouseup', handleMouseUp);

                const width = parseInt(treeContainer.style.width, 10);
                if (width) {
                    localStorage.setItem('tree-container-width', width);
                }
            }

            const savedWidth = localStorage.getItem('tree-container-width');
            if (savedWidth) {
                treeContainer.style.width = savedWidth + 'px';
            }
        }

        // жүӢеҠЁдҝқеӯҳеҝ«жҚ·й”®
        $(document).on('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (currentFile && vditor) {
                    saveCurrentFile();
                }
            }
        });

        // зӘ—еҸЈе…ій—ӯеүҚжҸҗзӨәдҝқеӯҳ
        window.addEventListener('beforeunload', function (e) {
            if (isDirty) {
                e.preventDefault();
                e.returnValue = 'жӮЁжңүжңӘдҝқеӯҳзҡ„жӣҙж”№пјҢзЎ®е®ҡиҰҒзҰ»ејҖеҗ—пјҹ';
                return 'жӮЁжңүжңӘдҝқеӯҳзҡ„жӣҙж”№пјҢзЎ®е®ҡиҰҒзҰ»ејҖеҗ—пјҹ';
            }
        });

        // еӨ„зҗҶзӘ—еҸЈеӨ§е°ҸеҸҳеҢ–
        $(window).on('resize', function () {
            if (tree) {
                tree.jstree('redraw');
            }
            if (vditor) {
                setTimeout(() => {
                    vditor.resize();
                }, 100);
            }
        });

        // еҲқе§ӢжЈҖжҹҘи®ӨиҜҒзҠ¶жҖҒ
        if (!checkAuth()) {
            handleUnauthorized();
        }
    });
</script>
</body>
</html>
