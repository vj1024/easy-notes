<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyNotes</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/themes/default/style.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/vditor@3.11.2/dist/index.css"/>
    <style>
        :root {
            --primary: #5645d4;
            --primary-pressed: #4534b3;
            --primary-deep: #3a2a99;
            --on-primary: #ffffff;
            --brand-navy: #0a1530;
            --link-blue: #0075de;
            --canvas: #ffffff;
            --surface: #f6f5f4;
            --surface-soft: #fafaf9;
            --hairline: #e5e3df;
            --hairline-soft: #ede9e4;
            --hairline-strong: #c8c4be;
            --ink: #1a1a1a;
            --charcoal: #37352f;
            --slate: #5d5b54;
            --steel: #787671;
            --stone: #a4a097;
            --muted: #bbb8b1;
            --semantic-success: #1aae39;
            --semantic-warning: #dd5b00;
            --semantic-error: #e03131;
            --card-tint-lavender: #e6e0f5;
            --card-tint-sky: #dcecfa;
            --card-tint-mint: #d9f3e1;
            --card-tint-peach: #ffe8d4;
            --card-tint-rose: #fde0ec;
            --card-tint-yellow: #fef7d6;
            --error-bg: #fdecea;
            --modal-overlay: rgba(10, 21, 48, 0.4);
            --vditor-theme: classic;
        }

        /* ====== Dark Theme ====== */
        :root[data-theme="dark"] {
            --primary: #7c6ef0;
            --primary-pressed: #6b5dd6;
            --primary-deep: #5645d4;
            --on-primary: #ffffff;
            --brand-navy: #0a1530;
            --link-blue: #4a9eff;
            --canvas: #0f0f0e;
            --surface: #1a1a19;
            --surface-soft: #161615;
            --hairline: #2a2928;
            --hairline-soft: #232221;
            --hairline-strong: #3a3938;
            --ink: #e8e6e3;
            --charcoal: #d4d2cc;
            --slate: #a8a59f;
            --steel: #8b8985;
            --stone: #6b6964;
            --muted: #4a4845;
            --semantic-success: #2dd966;
            --semantic-warning: #ff8c42;
            --semantic-error: #ff6b6b;
            --card-tint-lavender: #2d2540;
            --card-tint-sky: #1a2940;
            --card-tint-mint: #1a3328;
            --card-tint-peach: #3d2818;
            --card-tint-rose: #3d1a2a;
            --card-tint-yellow: #332c18;
            --error-bg: #3d1a1a;
            --modal-overlay: rgba(0, 0, 0, 0.6);
            --vditor-theme: dark;
        }

        body, .sidebar, .editor-area, .modal, .context-menu, .status-bar, .editor-topbar {
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: var(--surface);
            color: var(--ink);
        }

        /* ====== 主容器 ====== */
        .app {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* ====== 侧边栏 ====== */
        .sidebar {
            width: 260px;
            min-width: 200px;
            max-width: 400px;
            height: 100%;
            background: var(--canvas);
            border-right: 1px solid var(--hairline);
            display: flex;
            flex-direction: column;
            position: relative;
            flex-shrink: 0;
        }

        /* 侧边栏头部 */
        .sidebar-header {
            padding: 14px 12px 0;
            flex-shrink: 0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .theme-toggle svg {
            width: 14px;
            height: 14px;
        }

        .theme-toggle {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--slate);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--surface);
            color: var(--ink);
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
            padding: 0 4px;
            margin-bottom: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 6px 8px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--slate);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-family: inherit;
        }

        .action-btn:hover {
            background: var(--surface);
            color: var(--ink);
        }

        .action-btn.danger:hover {
            background: var(--error-bg);
            color: var(--semantic-error);
        }

        .action-btn .icon {
            font-size: 14px;
        }

        .sidebar-brand-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-brand-logo {
            width: 22px;
            height: 22px;
            background: var(--primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--on-primary);
        }

        .sidebar-brand-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: -0.3px;
        }

        /* 操作按钮栏 */





        /* 搜索框 */
        .search-box {
            padding: 0 4px;
            margin-bottom: 4px;
        }

        .search-input-wrap {
            position: relative;
        }

        .search-input-wrap .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--stone);
            font-size: 13px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 7px 12px 7px 32px;
            border: 1px solid var(--hairline);
            border-radius: 8px;
            font-size: 13px;
            color: var(--ink);
            background: var(--surface-soft);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
            font-family: inherit;
        }

        .search-input::placeholder { color: var(--stone); }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(86, 69, 212, 0.12);
            background: var(--canvas);
        }

        .search-stats {
            padding: 4px 8px;
            font-size: 11px;
            color: var(--stone);
            font-style: italic;
        }

        /* 文件树 */
        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 4px 4px;
        }

        /* 拖拽手柄 */
        .resize-handle {
            width: 8px;
            height: 100%;
            background: transparent;
            cursor: col-resize;
            position: absolute;
            right: -4px;
            top: 0;
            z-index: 10;
            transition: background 0.2s;
        }

        .resize-handle:hover { background: var(--primary); opacity: 0.5; }
        .resize-handle.active { background: var(--primary); opacity: 0.8; }

        /* ====== 编辑器区域 ====== */
        .editor-area {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            min-width: 400px;
            background: var(--canvas);
            overflow: hidden;
        }

        /* 编辑器顶部栏 */
        .editor-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            border-bottom: 1px solid var(--hairline-soft);
            flex-shrink: 0;
            min-height: 44px;
        }

        .editor-topbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb {
            font-size: 13px;
            color: var(--slate);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .breadcrumb .sep { color: var(--stone); margin: 0 2px; }

        .breadcrumb .current {
            color: var(--ink);
            font-weight: 500;
        }

        .save-indicator {
            font-size: 11px;
            color: var(--stone);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .save-indicator.dirty { color: var(--semantic-warning); }
        .save-indicator.saved { color: var(--semantic-success); }

        /* 编辑器内容 */
        .editor-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #vditor-container {
            flex: 1;
            overflow: hidden;
            background: var(--canvas);
        }

        /* 状态栏 */
        .status-bar {
            padding: 6px 16px;
            background: var(--surface);
            border-top: 1px solid var(--hairline-soft);
            font-size: 11px;
            color: var(--stone);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', monospace;
        }

        /* ====== 空状态 ====== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--stone);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            background: var(--surface);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 20px;
            border: 1px solid var(--hairline);
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--charcoal);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 13px;
            color: var(--stone);
            line-height: 1.5;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--stone);
            font-size: 14px;
        }

        .loading::before {
            content: "";
            display: block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--hairline);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            color: var(--semantic-error);
            padding: 12px 16px;
            background: var(--error-bg);
            border-radius: 8px;
            margin: 16px;
            font-size: 13px;
            border-left: 3px solid var(--semantic-error);
        }

        /* ====== 未授权状态 ====== */
        .unauthorized {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            gap: 16px;
        }

        .unauthorized-msg {
            color: var(--semantic-error);
            font-size: 15px;
            font-weight: 500;
        }

        .btn-primary {
            padding: 10px 24px;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }

        .btn-primary:hover { background: var(--primary-deep); }

        /* ====== 右键菜单 ====== */
        .context-menu {
            position: fixed;
            background: var(--canvas);
            border: 1px solid var(--hairline);
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            padding: 4px;
            z-index: 10000;
            min-width: 180px;
            display: none;
        }

        .ctx-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            color: var(--charcoal);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s;
        }

        .ctx-item:hover { background: var(--surface); }

        .ctx-item.danger { color: var(--semantic-error); }
        .ctx-item.danger:hover { background: var(--error-bg); }

        .ctx-divider {
            height: 1px;
            background: var(--hairline-soft);
            margin: 4px 0;
        }

        /* ====== 弹窗 ====== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay);
            z-index: 10001;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--canvas);
            border-radius: 14px;
            padding: 24px;
            min-width: 380px;
            max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }

        .modal h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        .modal input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--hairline-strong);
            border-radius: 8px;
            font-size: 14px;
            color: var(--ink);
            background: var(--canvas);
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.15s, box-shadow 0.15s;
            font-family: inherit;
            height: 40px;
        }

        .modal input::placeholder { color: var(--stone); }

        .modal input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(86, 69, 212, 0.12);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .modal-actions button {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--hairline);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .btn-cancel {
            background: var(--canvas);
            color: var(--charcoal);
        }

        .btn-cancel:hover { background: var(--surface); }

        .btn-confirm {
            background: var(--primary);
            color: var(--on-primary);
            border-color: var(--primary);
        }

        .btn-confirm:hover { background: var(--primary-deep); }

        .btn-danger-confirm {
            background: var(--semantic-error);
            color: #fff;
            border-color: var(--semantic-error);
        }

        .btn-danger-confirm:hover { background: #c62828; }

        .delete-message {
            margin: 0 0 16px;
            color: var(--slate);
            font-size: 13px;
            line-height: 1.6;
        }

        /* ====== jsTree 定制 ====== */
        .jstree-default .jstree-anchor {
            border-radius: 6px !important;
            margin: 1px 0;
            padding: 0 8px !important;
            height: 28px !important;
            line-height: 28px !important;
            font-size: 13px !important;
            cursor: pointer;
            color: var(--charcoal);
            transition: background-color 0.12s ease, color 0.12s ease;
        }

        /* hover */
        .jstree-default .jstree-hovered {
            background: var(--surface) !important;
            box-shadow: none !important;
            color: var(--ink) !important;
        }

        /* 选中态 - light: 柔和淡紫底 + 深紫字 + 左侧紫色指示条 */
        .jstree-default .jstree-clicked {
            background: rgba(86, 69, 212, 0.1) !important;
            color: var(--primary) !important;
            box-shadow: none !important;
            font-weight: 500;
            position: relative;
        }

        .jstree-default .jstree-clicked::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            border-radius: 0 3px 3px 0;
            background: var(--primary);
        }

        /* dark 模式选中态 - 半透明紫 + 亮紫字 */
        :root[data-theme="dark"] .jstree-default .jstree-clicked {
            background: rgba(124, 110, 240, 0.15) !important;
            color: #a89cff !important;
        }

        :root[data-theme="dark"] .jstree-default .jstree-clicked::before {
            background: #a89cff;
        }

        :root[data-theme="dark"] .jstree-default .jstree-hovered {
            background: rgba(255, 255, 255, 0.05) !important;
            color: var(--ink) !important;
        }

        :root[data-theme="dark"] .jstree-default .jstree-anchor {
            color: var(--charcoal);
        }

        .jstree-default .jstree-icon {
            line-height: 28px !important;
        }

        .jstree-default .jstree-themeicon { font-size: 12px; }

        /* ====== 滚动条 ====== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--stone); }

        /* ====== Vditor 覆盖 ====== */
        #vditor { height: 100% !important; max-height: 100%; }

        /* ====== Vditor Dark Mode 覆盖 ====== */
        :root[data-theme="dark"] .vditor {
            background-color: var(--canvas) !important;
            border-color: var(--hairline) !important;
        }
        :root[data-theme="dark"] .vditor-toolbar {
            background-color: var(--surface) !important;
            border-color: var(--hairline) !important;
        }
        :root[data-theme="dark"] .vditor-toolbar .vditor-tooltipped {
            color: var(--slate) !important;
        }
        :root[data-theme="dark"] .vditor-toolbar .vditor-tooltipped:hover {
            color: var(--ink) !important;
            background-color: var(--surface-soft) !important;
        }
        :root[data-theme="dark"] .vditor-content {
            background-color: var(--canvas) !important;
        }
        :root[data-theme="dark"] .vditor-reset {
            background-color: var(--canvas) !important;
            color: var(--ink) !important;
        }
        :root[data-theme="dark"] .vditor-textarea {
            background-color: var(--canvas) !important;
            color: var(--ink) !important;
        }
        :root[data-theme="dark"] .vditor-sv {
            background-color: var(--canvas) !important;
            color: var(--ink) !important;
        }
        :root[data-theme="dark"] .vditor-wysiwyg {
            background-color: var(--canvas) !important;
            color: var(--ink) !important;
        }
        :root[data-theme="dark"] .vditor-ir {
            background-color: var(--canvas) !important;
            color: var(--ink) !important;
        }
        :root[data-theme="dark"] .vditor-preview {
            background-color: var(--canvas) !important;
            color: var(--ink) !important;
        }
        :root[data-theme="dark"] .vditor-outline {
            background-color: var(--surface) !important;
            border-color: var(--hairline) !important;
        }
        :root[data-theme="dark"] .vditor-outline__title {
            color: var(--steel) !important;
        }
        :root[data-theme="dark"] .vditor-outline__content li span,
        :root[data-theme="dark"] .vditor-outline__content li a,
        :root[data-theme="dark"] .vditor-outline__content li {
            color: var(--steel) !important;
        }
        :root[data-theme="dark"] .vditor-outline__content li span:hover,
        :root[data-theme="dark"] .vditor-outline__content li a:hover {
            color: var(--ink) !important;
        }
        :root[data-theme="dark"] .vditor-outline .vditor-outline__item--current,
        :root[data-theme="dark"] .vditor-outline__content li.vditor-outline__item--current span {
            color: var(--primary) !important;
            background-color: var(--surface-soft) !important;
        }
        :root[data-theme="dark"] .vditor-hint {
            background-color: var(--surface) !important;
            border-color: var(--hairline-strong) !important;
        }
        :root[data-theme="dark"] .vditor-hint .vditor-hint__item {
            color: var(--charcoal) !important;
        }
        :root[data-theme="dark"] .vditor-hint .vditor-hint__item--current {
            background-color: var(--primary) !important;
            color: var(--on-primary) !important;
        }
        :root[data-theme="dark"] .vditor-tip {
            background-color: var(--surface) !important;
            color: var(--charcoal) !important;
        }
        :root[data-theme="dark"] .vditor-export__item {
            color: var(--charcoal) !important;
        }
        :root[data-theme="dark"] .vditor-export__item:hover {
            background-color: var(--surface-soft) !important;
        }
        :root[data-theme="dark"] .vditor-comment {
            background-color: var(--surface) !important;
            border-color: var(--hairline) !important;
        }
        :root[data-theme="dark"] .vditor-input {
            border-color: var(--hairline-strong) !important;
            color: var(--ink) !important;
            background: var(--canvas) !important;
        }
        :root[data-theme="dark"] .vditor-input:focus {
            border-color: var(--primary) !important;
        }
        :root[data-theme="dark"] .vditor-button {
            color: var(--charcoal) !important;
            border-color: var(--hairline-strong) !important;
        }
        :root[data-theme="dark"] .vditor-button--current {
            color: var(--primary) !important;
            border-color: var(--primary) !important;
        }
        :root[data-theme="dark"] code,
        :root[data-theme="dark"] pre {
            background: var(--surface) !important;
            color: var(--ink) !important;
        }
        :root[data-theme="dark"] .vditor-reset code {
            background: var(--surface) !important;
            color: var(--charcoal) !important;
        }
        :root[data-theme="dark"] .vditor-reset pre {
            background: var(--surface-soft) !important;
        }
        :root[data-theme="dark"] .vditor-reset blockquote {
            color: var(--slate) !important;
            border-color: var(--hairline-strong) !important;
        }
        :root[data-theme="dark"] .vditor-reset table td,
        :root[data-theme="dark"] .vditor-reset table th {
            border-color: var(--hairline) !important;
        }
        :root[data-theme="dark"] .vditor-reset table tr:nth-child(2n) {
            background: var(--surface-soft) !important;
        }

        /* ====== 移动端 ====== */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 10px; left: 10px;
            z-index: 999;
            background: var(--primary);
            color: var(--on-primary);
            border: none;
            border-radius: 10px;
            width: 40px; height: 40px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .overlay-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--modal-overlay);
            z-index: 998;
            display: none;
            backdrop-filter: blur(2px);
        }

        .overlay-backdrop.visible { display: block; }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed !important;
                top: 0; left: 0;
                width: 100vw !important;
                height: 100vh !important;
                max-width: none !important;
                z-index: 1001 !important;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
            }

            .sidebar.sidebar-open { transform: translateX(0); }

            .mobile-toggle { display: flex; align-items: center; justify-content: center; }

            .editor-area { min-width: 0; width: 100%; }

            .resize-handle { display: none !important; }
        }

        @media (max-width: 400px) {
            .sidebar-actions { flex-wrap: wrap; }
            .modal { min-width: 300px; padding: 20px; }
        }
    </style>
</head>
</head>
<body>

<button class="mobile-toggle" id="mobile-toggle">📂</button>
<div class="overlay-backdrop" id="overlay-backdrop"></div>

<div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="sidebar-brand-left">
                    <div class="sidebar-brand-logo">📝</div>
                    <div class="sidebar-brand-name">EasyNotes</div>
                </div>
                <button class="theme-toggle" id="theme-toggle" title="切换主题 (亮/暗/自动)">☀</button>
            </div>

    <!-- 编辑器 -->
    <div class="editor-area">

        <div class="editor-content">
            <div id="vditor-container">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>

</div>

<!-- 右键菜单 -->
<div class="context-menu" id="context-menu">
    <div id="ctx-folder-items" style="display:none">
        <div class="ctx-item" data-action="new-file">📄 新建文件</div>
        <div class="ctx-item" data-action="new-folder">📁 新建文件夹</div>
        <div class="ctx-divider"></div>

<!-- 新建文件弹窗 -->
<div class="modal-overlay" id="modal-new-file">
    <div class="modal">
        <h3>新建文件</h3>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/jstree.min.js"></script>
<script src="https://unpkg.com/vditor@3.11.2/dist/index.min.js"></script>
<script>
// ====== 主题管理 (提前执行避免闪烁) ======
const THEME_KEY = 'easynotes-theme';

function getStoredTheme() { return localStorage.getItem(THEME_KEY) || 'auto'; }

function resolveTheme(theme) {
    if (theme === 'auto') return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    return theme;
}

function getVditorThemeName(resolved) { return resolved === 'dark' ? 'dark' : 'classic'; }

// 立即应用主题
(function applyInitialTheme() {
    const resolved = resolveTheme(getStoredTheme());
    document.documentElement.setAttribute('data-theme', resolved);
})();

// 监听浏览器主题变化 (auto 模式下自动跟随)
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (getStoredTheme() === 'auto') {
        const resolved = resolveTheme('auto');
        document.documentElement.setAttribute('data-theme', resolved);
        if (window.vditorInstance) {
            try { window.vditorInstance.setTheme(getVditorThemeName(resolved)); } catch(e) {}
        }
        updateThemeToggleIcon();
    }
});

function updateThemeToggleIcon() {
    const btn = document.getElementById('theme-toggle');
    if (!btn) return;
    const stored = getStoredTheme();
    if (stored === 'auto') btn.textContent = '🖥';
    else if (resolveTheme(stored) === 'dark') btn.textContent = '🌙';
    else btn.textContent = '☀';
}

function cycleTheme() {
    const current = getStoredTheme();
    const next = current === 'light' ? 'dark' : current === 'dark' ? 'auto' : 'light';
    localStorage.setItem(THEME_KEY, next);
    const resolved = resolveTheme(next);
    document.documentElement.setAttribute('data-theme', resolved);
    // 同步 Vditor 主题
    if (window.vditorInstance) {
        try { window.vditorInstance.setTheme(getVditorThemeName(resolved)); } catch(e) {}
    }
    updateThemeToggleIcon();
}

$(function () {
    const BASE_URL = "";
    let currentSearchTerm = '';
    let searchTimeout = null;
    let vditor = null;
    let currentFile = null;
    let saveInterval = null;
    let isDirty = false;
    let lastSaveTime = null;
    let isResizing = false;

    initResizeHandler();

    // 绑定主题切换按钮
    updateThemeToggleIcon();
    $('#theme-toggle').on('click', cycleTheme);

    // ====== 认证 ======
    function checkAuth() {
        const token = localStorage.getItem('token');
        if (!token) { redirectToLogin(); return false; }
        return true;
    }

    function redirectToLogin() { window.location.href = '/login'; }

    function handleUnauthorized() {
        localStorage.removeItem('token');
        $('#vditor-container').html(`
            <div class="unauthorized">
                <div class="unauthorized-msg">登录已过期，请重新登录</div>
                <button class="btn-primary" id="login-button">前往登录</button>
            </div>
        `);
        $('#login-button').on('click', redirectToLogin);
        if (vditor) { vditor.destroy(); vditor = null; }
        currentFile = null; isDirty = false;
        setTimeout(redirectToLogin, 2000);
    }

    function getAuthHeaders() {
        const token = localStorage.getItem('token');
        return token ? { 'Authorization': 'Bearer ' + token } : {};
    }

    function authAjax(options) {
        if (!checkAuth()) return Promise.reject('未认证');
        const token = localStorage.getItem('token');
        options.headers = options.headers || {};
        if (token) options.headers['Authorization'] = 'Bearer ' + token;
        return new Promise((resolve, reject) => {
            $.ajax({
                ...options,
                statusCode: {
                    401: function () { handleUnauthorized(); reject('未授权'); }
                },
                success: function (data, ts, xhr) { resolve(data, ts, xhr); },
                error: function (xhr, ts, err) {
                    if (xhr.status === 401) handleUnauthorized();
                    reject(xhr, ts, err);
                }
            });
        });
    }

    // ====== 搜索 ======
    function updateSearchStats(count) {
        if (currentSearchTerm.length === 0) {
            $('#search-stats').text('');
        } else {
            $('#search-stats').text(`找到 ${count} 个匹配项`);
        }
    }

    $('#search-input').on('input', function () {
        const searchTerm = $(this).val().trim();
        currentSearchTerm = searchTerm;
        clearTimeout(searchTimeout);
        if (searchTerm.length > 0 && searchTerm.replace(/\s+/g, '').length < 2) {
            $('#search-stats').text('请输入至少2个有效字符');
            return;
        }
        searchTimeout = setTimeout(() => {
            tree.jstree(true).refresh();
            if (searchTerm.length === 0) $('#search-stats').text('');
            else $('#search-stats').text('搜索中...');
        }, 300);
    });

    // ====== jsTree ======
    const tree = $('#file-tree').jstree({
        'core': {
            'data': function (obj, callback) {
                // 过滤掉根目录下的 _images 文件夹
                function filterTree(nodes, isRoot) {
                    if (!Array.isArray(nodes)) return nodes;
                    return nodes.filter(n => {
                        // 只在根层过滤 _images
                        if (isRoot && n.text === '_images') return false;
                        return true;
                    }).map(n => {
                        if (n.children && Array.isArray(n.children)) n.children = filterTree(n.children, false);
                        return n;
                    });
                }
                if (currentSearchTerm) {
                    authAjax({ url: BASE_URL + '/api/files', method: 'GET', data: { search: currentSearchTerm }, dataType: 'json' })
                        .then(function (data) {
                            if (data.results) {
                                callback.call(this, filterTree(data.results, true));
                                updateSearchStats(data.results.length);
                                setTimeout(() => { tree.jstree(true).open_all(); $('#file-tree a').removeAttr('href'); }, 100);
                            } else { callback.call(this, []); updateSearchStats(0); }
                        })
                        .catch(function (e) { if (e !== '未授权' && e.status !== 401) { callback.call(this, []); updateSearchStats(0); } });
                } else {
                    authAjax({ url: BASE_URL + '/api/files?list=true', method: 'GET', dataType: 'json' })
                        .then(function (data) {
                            callback.call(this, filterTree(data, true));
                            $('#search-stats').text('');
                            setTimeout(() => $('#file-tree a').removeAttr('href'), 100);
                        })
                        .catch(function (e) { if (e !== '未授权' && e.status !== 401) callback.call(this, []); });
                }
            },
            'themes': { 'responsive': true, 'dots': false, 'icons': true },
            'check_callback': true,
            'force_text': true
        },
        'plugins': ['types'],
        'types': {
            'default': { 'icon': 'jstree-folder' },
            'file': { 'icon': 'jstree-file' }
        }
    });

    $('#file-tree').on('ready.jstree after_open.jstree after_close.jstree', function () {
        setTimeout(() => $('#file-tree a').removeAttr('href'), 50);
    });

    // ====== 文件选择 ======
    tree.on('select_node.jstree', function (e, data) {
        const node = data.node;
        if (node.type === 'file') {
            loadFileForEditing(node);
        } else if (node.path) {
            loadFileByPath(node.path, node.text);
        } else {
            const filePath = buildFilePath(node);
            updateBreadcrumb(filePath, true);
            $('#vditor-container').html('<div class="empty-state"><div class="empty-state-icon">📁</div><h3>' + node.text + '</h3><p>选择文件夹内的文件进行编辑</p></div>');
            if (vditor) { vditor.destroy(); vditor = null; }
            clearSaveInterval(); currentFile = null; isDirty = false;
        }
    });

    // ====== 文件操作 ======
    function loadFileForEditing(node) {
        if (!checkAuth()) return;
        if (isDirty && currentFile && vditor) {
            if (confirm('当前文件有未保存的更改，是否先保存？')) {
                saveCurrentFile().then(() => loadNewFile(node)).catch(() => loadNewFile(node));
            } else { loadNewFile(node); }
        } else { loadNewFile(node); }
    }

    function loadFileByPath(filePath, fileName) {
        if (!checkAuth()) return;
        if (isDirty && currentFile && vditor) {
            if (confirm('当前文件有未保存的更改，是否先保存？')) {
                saveCurrentFile().then(() => loadNewFileByPath(filePath, fileName)).catch(() => loadNewFileByPath(filePath, fileName));
            } else { loadNewFileByPath(filePath, fileName); }
        } else { loadNewFileByPath(filePath, fileName); }
    }

    function loadNewFile(node) {
        const filePath = buildFilePath(node);
        if (!filePath) { $('#vditor-container').html('<div class="error-box">无法构建文件路径</div>'); return; }
        updateBreadcrumb(filePath, false);
        $('#vditor-container').html('<div class="loading">加载中...</div>');
        $('#status-left').text('加载中...');
        authAjax({ url: BASE_URL + `/api/files/${filePath}`, method: 'GET', dataType: 'text' })
            .then(function (content) {
                currentFile = { id: node.id, name: node.text, path: filePath };
                const savedPosition = getFileScrollPosition(filePath);
                initEditor(content, savedPosition);
                $('#status-left').text('就绪');
                isDirty = false;
            })
            .catch(function (e) {
                if (e.status !== 401) {
                    $('#vditor-container').html('<div class="error-box">加载失败: ' + (e.responseText || '未知错误') + '</div>');
                    $('#status-left').text('加载失败');
                }
            });
    }

    function loadNewFileByPath(filePath, fileName) {
        updateBreadcrumb(filePath, false);
        $('#vditor-container').html('<div class="loading">加载中...</div>');
        $('#status-left').text('加载中...');
        authAjax({ url: BASE_URL + `/api/files/${filePath}`, method: 'GET', dataType: 'text' })
            .then(function (content) {
                currentFile = { id: 'search-' + filePath, name: fileName, path: filePath };
                const savedPosition = getFileScrollPosition(filePath);
                initEditor(content, savedPosition);
                $('#status-left').text('就绪');
                isDirty = false;
            })
            .catch(function (e) {
                if (e.status !== 401) {
                    $('#vditor-container').html('<div class="error-box">加载失败: ' + (e.responseText || '未知错误') + '</div>');
                    $('#status-left').text('加载失败');
                }
            });
    }

    function updateBreadcrumb(filePath, isDir) {
        const parts = filePath.split('/');
        let html = '';
        parts.forEach((p, i) => {
            if (i > 0) html += '<span class="sep">/</span>';
            html += `<span${i === parts.length - 1 ? ' class="current"' : ''}>${p}</span>`;
        });
        $('#breadcrumb').html(html);
    }

    function buildFilePath(node) {
        if (node.id === 'root') return '';
        let parts = [];
        let cur = node;
        while (cur && cur.id !== '#' && cur.id !== 'root') {
            if (cur.text && cur.text !== 'root') parts.unshift(cur.text);
            if (cur.parent && cur.parent !== '#') cur = tree.jstree('get_node', cur.parent);
            else break;
        }
        return parts.length > 0 ? parts.join('/') : node.text;
    }

    // ====== 滚动位置持久化 ======
    function saveFileScrollPosition(filePath) {
        if (!vditor || !filePath) return;
        try {
            const d = { previewScrollTop: 0, irScrollTop: 0, svScrollTop: 0, wysiwygScrollTop: 0, timestamp: Date.now() };
            if (vditor.vditor?.preview?.element) d.previewScrollTop = vditor.vditor.preview.element.scrollTop;
            if (vditor.vditor?.ir?.element) d.irScrollTop = vditor.vditor.ir.element.scrollTop;
            if (vditor.vditor?.sv?.element) d.svScrollTop = vditor.vditor.sv.element.scrollTop;
            if (vditor.vditor?.wysiwyg?.element) d.wysiwygScrollTop = vditor.vditor.wysiwyg.element.scrollTop;
            localStorage.setItem(`file_scroll_position_${filePath}`, JSON.stringify(d));
        } catch (e) { /* ignore */ }
    }

    function getFileScrollPosition(filePath) {
        if (!filePath) return null;
        try { const s = localStorage.getItem(`file_scroll_position_${filePath}`); return s ? JSON.parse(s) : null; }
        catch (e) { return null; }
    }

    // ====== Vditor 编辑器 ======
    function initEditor(content, savedPosition = null) {
        if (vditor) { vditor.destroy(); vditor = null; }
        $('#vditor-container').html('<div id="vditor"></div>');

        const isMobile = window.innerWidth <= 576;
        // 获取当前主题对应的 Vditor 主题名
        const resolvedTheme = resolveTheme(getStoredTheme());

        vditor = new Vditor('vditor', {
            height: isMobile ? (window.innerHeight - 40) + 'px' : '100%',
            value: content,
            cache: { enable: false },
            placeholder: '在此编辑文件内容...',
            toolbar: [
                "emoji", "headings", "bold", "italic", "strike", "link", "|",
                "list", "ordered-list", "check", "outdent", "indent", "|",
                "quote", "line", "code", "inline-code", "insert-before", "insert-after", "|",
                "upload", "record", "table", "|",
                "undo", "redo", "|",
                "edit-mode", "content-theme", "code-theme", "export",
                { name: "more", toolbar: ["fullscreen", "both", "preview", "info", "help"] }
            ],
            toolbarConfig: { pin: true },
            theme: {
                current: getVditorThemeName(resolvedTheme),
                path: 'https://unpkg.com/vditor@3.11.2/dist/css/content-theme',
            },
            outline: { enable: true, position: 'right' },
            input: function () {
                if (!isDirty) {
                    isDirty = true;
                    $('#save-indicator').addClass('dirty').removeClass('saved').text('● 未保存');
                }
                if (currentFile?.path) saveFileScrollPosition(currentFile.path);
            },
            focus: function () { startAutoSave(); },
            blur: function () {
                clearSaveInterval();
                if (currentFile?.path) saveFileScrollPosition(currentFile.path);
            },
            after: function () {
                startAutoSave();
                window.vditorInstance = vditor;
                // 确保 Vditor 主题与当前主题一致
                if (savedPosition && vditor) {
                    setTimeout(() => {
                        try {
                            if (vditor.vditor?.preview?.element) vditor.vditor.preview.element.scrollTop = savedPosition.previewScrollTop || 0;
                            if (vditor.vditor?.ir?.element) vditor.vditor.ir.element.scrollTop = savedPosition.irScrollTop || 0;
                            if (vditor.vditor?.sv?.element) vditor.vditor.sv.element.scrollTop = savedPosition.svScrollTop || 0;
                            if (vditor.vditor?.wysiwyg?.element) vditor.vditor.wysiwyg.element.scrollTop = savedPosition.wysiwygScrollTop || 0;
                        } catch (e) { /* ignore */ }
                    }, 100);
                }
                if (window.innerWidth <= 576) adjustEditorHeight();
            },
            resize: function () {
                if (currentFile?.path) saveFileScrollPosition(currentFile.path);
                if (window.innerWidth <= 576) adjustEditorHeight();
            }
        });
        isDirty = false;
    }

    function adjustEditorHeight() {
        if (vditor && window.innerWidth <= 576) {
            const c = document.getElementById('vditor-container');
            if (c) { c.style.height = (window.innerHeight - 40) + 'px'; setTimeout(() => vditor.resize(), 100); }
        }
    }

    // ====== 保存 ======
    function startAutoSave() {
        clearSaveInterval();
        saveInterval = setInterval(() => { if (isDirty && currentFile && vditor) saveCurrentFile(); }, 3000);
    }

    function clearSaveInterval() { if (saveInterval) { clearInterval(saveInterval); saveInterval = null; } }

    function saveCurrentFile() {
        return new Promise((resolve, reject) => {
            if (!currentFile || !vditor) { reject('没有文件可保存'); return; }
            const content = vditor.getValue();
            $('#save-indicator').text('保存中...').removeClass('dirty saved');
            authAjax({ url: BASE_URL + `/api/files/${currentFile.path}`, method: 'POST', contentType: 'text/plain', data: content })
                .then(function () {
                    isDirty = false;
                    lastSaveTime = new Date();
                    $('#save-indicator').addClass('saved').removeClass('dirty').text('✓ 已保存 ' + lastSaveTime.toLocaleTimeString());
                    resolve();
                })
                .catch(function (e) {
                    if (e.status !== 401) $('#save-indicator').text('保存失败').addClass('dirty');
                    reject(e);
                });
        });
    }

    // Ctrl+S
    $(document).on('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (currentFile && vditor) saveCurrentFile(); }
    });

    // ====== 拖拽调整 ======
    function initResizeHandler() {
        const handle = document.getElementById('resize-handle');
        const sidebar = document.getElementById('sidebar');
        let startX, startWidth;

        handle.addEventListener('mousedown', function (e) {
            isResizing = true; startX = e.clientX;
            startWidth = parseInt(getComputedStyle(sidebar).width, 10);
            handle.classList.add('active');
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            e.preventDefault();
        });

        function onMove(e) {
            if (!isResizing) return;
            const w = startWidth + e.clientX - startX;
            if (w >= 200 && w <= 500) {
                sidebar.style.width = w + 'px';
                if (vditor) setTimeout(() => vditor.resize(), 50);
            }
        }

        function onUp() {
            isResizing = false; handle.classList.remove('active');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            const w = parseInt(sidebar.style.width, 10);
            if (w) localStorage.setItem('sidebar-width', w);
        }

        const savedW = localStorage.getItem('sidebar-width');
        if (savedW) sidebar.style.width = savedW + 'px';
    }

    // ====== 窗口事件 ======
    window.addEventListener('beforeunload', function (e) {
        if (currentFile?.path) saveFileScrollPosition(currentFile.path);
        if (isDirty) { e.preventDefault(); e.returnValue = '有未保存的更改'; return e.returnValue; }
    });

    $(window).on('resize', function () {
        if (vditor) setTimeout(() => vditor.resize(), 100);
        if (window.innerWidth <= 576) adjustEditorHeight();
    });

    // ====== 移动端侧边栏 ======
    (function () {
        const toggle = document.getElementById('mobile-toggle');
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('overlay-backdrop');
        if (!toggle) return;

        toggle.addEventListener('click', () => { sidebar.classList.add('sidebar-open'); backdrop.classList.add('visible'); });
        backdrop.addEventListener('click', () => { sidebar.classList.remove('sidebar-open'); backdrop.classList.remove('visible'); });

        $('#file-tree').on('click', 'a', function () {
            if (window.innerWidth <= 576) {
                const nodeId = $(this).closest('li').attr('id');
                const node = tree.jstree('get_node', nodeId);
                if (node?.type === 'file') {
                    sidebar.classList.remove('sidebar-open');
                    backdrop.classList.remove('visible');
                    setTimeout(() => { if (vditor) vditor.resize(); }, 300);
                }
            }
        });
    })();

    // ====== 新建 / 删除功能 ======
    let contextNode = null;

    window.closeModal = function (id) { document.getElementById(id).classList.remove('active'); };
    function openModal(id) { document.getElementById(id).classList.add('active'); }

    function getSelectedDirPath() {
        const sel = tree.jstree('get_selected', true);
        if (!sel.length) return '';
        const node = sel[0];
        if (node.type === 'file') {
            const parent = tree.jstree('get_node', node.parent);
            return (parent && parent.id !== '#' && parent.id !== 'root') ? buildFilePath(parent) : '';
        }
        return buildFilePath(node);
    }

    $('#btn-new-file').on('click', function () {
        const dir = getSelectedDirPath();
        const input = document.getElementById('input-new-file');
        input.value = ''; input.dataset.dir = dir;
        openModal('modal-new-file');
        setTimeout(() => input.focus(), 100);
    });

    $('#btn-new-folder').on('click', function () {
        const dir = getSelectedDirPath();
        const input = document.getElementById('input-new-folder');
        input.value = ''; input.dataset.dir = dir;
        openModal('modal-new-folder');
        setTimeout(() => input.focus(), 100);
    });

    $('#btn-delete').on('click', function () {
        const sel = tree.jstree('get_selected', true);
        if (!sel.length) { alert('请先选择要删除的文件或文件夹'); return; }
        confirmAndDelete(sel[0]);
    });

    $('#btn-confirm-new-file').on('click', function () {
        const input = document.getElementById('input-new-file');
        const name = input.value.trim();
        if (!name) { input.style.borderColor = 'var(--semantic-error)'; return; }
        input.style.borderColor = '';
        const dir = input.dataset.dir || '';
        const fullPath = dir ? dir + '/' + name : name;
        authAjax({ url: BASE_URL + '/api/create-file', method: 'POST', contentType: 'application/json', data: JSON.stringify({ path: fullPath, content: '' }) })
            .then(() => { closeModal('modal-new-file'); tree.jstree(true).refresh(); $('#status-left').text('文件创建成功'); })
            .catch((e) => { if (e.status !== 401) { const m = e.responseJSON?.message || '创建失败'; alert(m); } });
    });

    $('#btn-confirm-new-folder').on('click', function () {
        const input = document.getElementById('input-new-folder');
        const name = input.value.trim();
        if (!name) { input.style.borderColor = 'var(--semantic-error)'; return; }
        input.style.borderColor = '';
        const dir = input.dataset.dir || '';
        const fullPath = dir ? dir + '/' + name : name;
        authAjax({ url: BASE_URL + '/api/mkdir', method: 'POST', contentType: 'application/json', data: JSON.stringify({ path: fullPath }) })
            .then(() => { closeModal('modal-new-folder'); tree.jstree(true).refresh(); $('#status-left').text('文件夹创建成功'); })
            .catch((e) => { if (e.status !== 401) { const m = e.responseJSON?.message || '创建失败'; alert(m); } });
    });

    function confirmAndDelete(node) {
        const filePath = buildFilePath(node);
        if (!filePath) { alert('无法删除根目录'); return; }
        const type = node.type === 'file' ? '文件' : '文件夹';
        const suffix = node.type !== 'file' ? ' 文件夹内所有内容将被删除。' : '';
        document.getElementById('delete-message').textContent = `确定要删除${type} "${node.text}" 吗？${suffix}`;
        document.getElementById('btn-confirm-delete').dataset.path = filePath;
        openModal('modal-delete');
    }

    $('#btn-confirm-delete').on('click', function () {
        const filePath = this.dataset.path;
        if (!filePath) return;
        authAjax({ url: BASE_URL + '/api/files/' + filePath, method: 'DELETE' })
            .then(() => {
                closeModal('modal-delete');
                if (currentFile && (currentFile.path === filePath || filePath.startsWith(currentFile.path + '/'))) {
                    if (vditor) { vditor.destroy(); vditor = null; }
                    currentFile = null; isDirty = false;
                    $('#vditor-container').html('<div class="empty-state"><div class="empty-state-icon">📝</div><h3>选择文件开始编辑</h3><p>从左侧选择一个文件，或创建新文件</p></div>');
                    $('#breadcrumb').html('<span class="current">EasyNotes</span>');
                    $('#save-indicator').text('');
                }
                tree.jstree(true).refresh();
                $('#status-left').text('删除成功');
            })
            .catch((e) => { if (e.status !== 401) { const m = e.responseJSON?.message || '删除失败'; alert(m); } });
    });

    // 回车确认
    $('#input-new-file').on('keydown', (e) => { if (e.key === 'Enter') $('#btn-confirm-new-file').click(); });
    $('#input-new-folder').on('keydown', (e) => { if (e.key === 'Enter') $('#btn-confirm-new-folder').click(); });

    // 弹窗外部关闭
    $('.modal-overlay').on('click', function (e) { if (e.target === this) closeModal(this.id); });

    // ESC
    $(document).on('keydown', function (e) {
        if (e.key === 'Escape') { $('.modal-overlay.active').each(function () { closeModal(this.id); }); $('#context-menu').hide(); }
    });

    // ====== 右键菜单 ======
    $('#file-tree').on('contextmenu', '.jstree-anchor', function (e) {
        e.preventDefault(); e.stopPropagation();
        const nodeId = $(this).closest('li').attr('id');
        const node = tree.jstree('get_node', nodeId);
        if (!node) return;
        tree.jstree('select_node', nodeId);
        contextNode = node;

        // 根据节点类型显隐菜单项
        const isFolder = node.type !== 'file';
        document.getElementById('ctx-folder-items').style.display = isFolder ? 'block' : 'none';

        const menu = document.getElementById('context-menu');
        menu.style.display = 'block';
        let x = e.clientX, y = e.clientY;
        if (x + 180 > window.innerWidth) x = window.innerWidth - 190;
        if (y + 120 > window.innerHeight) y = window.innerHeight - 130;
        menu.style.left = x + 'px'; menu.style.top = y + 'px';
    });

    $('#context-menu').on('click', '.ctx-item', function () {
        const action = $(this).data('action');
        $('#context-menu').hide();
        if (!contextNode) return;
        if (action === 'new-file') {
            // 在右键文件夹的子层创建
            const dir = contextNode.type !== 'file' ? buildFilePath(contextNode) : '';
            const input = document.getElementById('input-new-file');
            input.value = ''; input.dataset.dir = dir;
            openModal('modal-new-file'); setTimeout(() => input.focus(), 100);
        } else if (action === 'new-folder') {
            // 在右键文件夹的子层创建
            const dir = contextNode.type !== 'file' ? buildFilePath(contextNode) : '';
            const input = document.getElementById('input-new-folder');
            input.value = ''; input.dataset.dir = dir;
            openModal('modal-new-folder'); setTimeout(() => input.focus(), 100);
        } else if (action === 'delete') {
            confirmAndDelete(contextNode);
        }
    });

    $(document).on('click', () => $('#context-menu').hide());

    // 初始检查
    if (!checkAuth()) handleUnauthorized();
});
</script>
</body>
</html>
