<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyNotes</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/themes/default/style.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/vditor@3.11.2/dist/index.css"/>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .tree-container {
            width: 10%;
            min-width: 200px;
            max-width: 50%;
            height: 100%;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .resize-handle {
            width: 4px;
            height: 100%;
            background: #ddd;
            cursor: col-resize;
            position: absolute;
            right: -2px;
            top: 0;
            z-index: 10;
            transition: background-color 0.2s;
        }

        .resize-handle:hover {
            background: #4CAF50;
        }

        .resize-handle.active {
            background: #2E7D32;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
        }

        .search-box input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .editor-container {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            min-width: 400px;
        }

        .file-info-bar {
            padding: 10px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            color: #666;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #vditor-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .status-bar {
            padding: 8px 10px;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #666;
            text-align: right;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            color: #d32f2f;
            padding: 10px;
            background: #ffebee;
            border-radius: 4px;
            margin: 10px 0;
        }

        .no-file-selected {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            font-size: 16px;
        }

        .search-stats {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }

        #vditor {
            height: 100% !important;
        }

        .unauthorized {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
        }

        .unauthorized-message {
            color: #d32f2f;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .login-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .login-button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="tree-container" id="tree-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索文件...">
            <div class="search-stats" id="search-stats"></div>
        </div>
        <div id="file-tree">
            <div class="loading">加载文件树...</div>
        </div>
        <div class="resize-handle" id="resize-handle"></div>
    </div>

    <div class="editor-container">
        <div class="file-info-bar" id="file-info-bar">
            <div>
                <span id="file-title">未选择文件</span>
            </div>
        </div>
        <div class="editor-content">
            <div id="vditor-container">
                <div class="no-file-selected">请从左侧选择文件进行编辑</div>
            </div>
        </div>
        <div class="status-bar" id="status-bar">
            <div>就绪</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/jstree.min.js"></script>
<script src="https://unpkg.com/vditor@3.11.2/dist/index.min.js"></script>
<script>
    $(function () {
        const BASE_URL = ""
        let currentSearchTerm = '';
        let searchTimeout = null;
        let vditor = null;
        let currentFile = null;
        let saveInterval = null;
        let isDirty = false;
        let lastSaveTime = null;
        let isResizing = false;

        // 初始化拖动调整大小功能
        initResizeHandler();

        // 检查认证状态
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                redirectToLogin();
                return false;
            }
            return true;
        }

        // 跳转到登录页
        function redirectToLogin() {
            window.location.href = '/login';
        }

        // 处理401错误
        function handleUnauthorized() {
            // 清空token
            localStorage.removeItem('token');

            // 显示未授权提示
            $('#vditor-container').html(`
                    <div class="unauthorized">
                        <div class="unauthorized-message">登录已过期，请重新登录</div>
                        <button class="login-button" id="login-button">前往登录</button>
                    </div>
                `);

            // 绑定登录按钮事件
            $('#login-button').on('click', function () {
                redirectToLogin();
            });

            // 禁用编辑器功能
            if (vditor) {
                vditor.destroy();
                vditor = null;
            }

            // 清除当前文件状态
            currentFile = null;
            isDirty = false;

            // 2秒后自动跳转
            setTimeout(redirectToLogin, 2000);
        }

        // 获取认证头
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return token ? {
                'Authorization': 'Bearer ' + token
            } : {};
        }

        // 带认证的AJAX请求
        function authAjax(options) {
            // 检查认证状态
            if (!checkAuth()) {
                return Promise.reject('未认证');
            }

            const token = localStorage.getItem('token');
            options.headers = options.headers || {};
            if (token) {
                options.headers['Authorization'] = 'Bearer ' + token;
            }

            return new Promise((resolve, reject) => {
                $.ajax({
                    ...options,
                    statusCode: {
                        401: function () {
                            handleUnauthorized();
                            reject('未授权');
                        }
                    },
                    success: function (data, textStatus, jqXHR) {
                        resolve(data, textStatus, jqXHR);
                    },
                    error: function (jqXHR, textStatus, errorThrown) {
                        if (jqXHR.status === 401) {
                            handleUnauthorized();
                        }
                        reject(jqXHR, textStatus, errorThrown);
                    }
                });
            });
        }

        // 更新搜索统计信息
        function updateSearchStats(count) {
            if (currentSearchTerm.length === 0) {
                $('#search-stats').text('');
            } else {
                $('#search-stats').text(`找到 ${count} 个匹配项`);
            }
        }

        // 初始化jstree
        const tree = $('#file-tree').jstree({
            'core': {
                'data': function (obj, callback) {
                    if (currentSearchTerm) {
                        // 如果有搜索词，使用搜索API
                        authAjax({
                            url: BASE_URL + '/api/files',
                            method: 'GET',
                            data: { search: currentSearchTerm },
                            dataType: 'json'
                        })
                        .then(function (data) {
                            if (data.results) {
                                // 使用搜索结果
                                callback.call(this, data.results);
                                // 更新搜索统计信息
                                updateSearchStats(data.results.length);

                                // 在数据加载完成后展开所有节点
                                setTimeout(function() {
                                    tree.jstree(true).open_all();
                                }, 100);
                            } else {
                                callback.call(this, []);
                                updateSearchStats(0);
                            }
                        })
                        .catch(function (error) {
                            if (error !== '未授权' && error.status !== 401) {
                                console.error('搜索失败:', error);
                                callback.call(this, []);
                                updateSearchStats(0);
                            }
                        });
                    } else {
                        // 否则使用正常的文件列表API
                        authAjax({
                            url: BASE_URL + '/api/files?list=true',
                            method: 'GET',
                            dataType: 'json'
                        })
                        .then(function (data) {
                            callback.call(this, data);
                            // 当不是搜索模式时，清空搜索统计
                            if (currentSearchTerm === '') {
                                $('#search-stats').text('');
                            }
                        })
                        .catch(function (error) {
                            if (error !== '未授权' && error.status !== 401) {
                                console.error('加载文件列表失败:', error);
                                callback.call(this, []);
                            }
                        });
                    }
                },
                'themes': {
                    'responsive': true,
                    'dots': true,
                    'icons': true
                },
                'error': function (xhr, status, error) {
                    if (xhr.status === 401) {
                        handleUnauthorized();
                    } else {
                        $('#file-tree').html('<div class="error">加载文件列表失败: ' + error + '</div>');
                    }
                }
            },
            'plugins': ['types'],
            'types': {
                'default': {
                    'icon': 'jstree-folder'
                },
                'file': {
                    'icon': 'jstree-file'
                }
            }
        });

        // 搜索功能
        $('#search-input').on('input', function () {
            const searchTerm = $(this).val().trim();
            currentSearchTerm = searchTerm;

            clearTimeout(searchTimeout);

            // 允许空格分隔的多个关键字，只要总长度大于0即可
            if (searchTerm.length > 0 && searchTerm.replace(/\s+/g, '').length < 2) {
                $('#search-stats').text('请输入至少2个有效字符');
                return;
            }

            // 延迟执行搜索，避免频繁请求
            searchTimeout = setTimeout(() => {
                // 重新加载树以应用搜索条件
                tree.jstree(true).refresh();

                if (searchTerm.length === 0) {
                    $('#search-stats').text('');
                } else {
                    $('#search-stats').text('搜索中...');
                }
            }, 300);
        });

        // 处理节点点击事件
        tree.on('select_node.jstree', function (e, data) {
            const node = data.node;

            if (node.type === 'file') {
                loadFileForEditing(node);
            } else {
                // 对于搜索结果，我们只处理文件，不处理文件夹
                if (node.path) {
                    // 这是一个搜索结果节点，直接加载文件
                    loadFileByPath(node.path, node.text);
                } else {
                    const filePath = buildFilePath(node);
                    $('#file-title').text(`文件夹: ${filePath}`);
                    $('#vditor-container').html('<div class="no-file-selected">请选择文件进行编辑</div>');
                    if (vditor) {
                        vditor.destroy();
                        vditor = null;
                    }
                    clearSaveInterval();
                    currentFile = null;
                    isDirty = false;
                }
            }
        });

        // 加载文件到编辑器
        function loadFileForEditing(node) {
            if (!checkAuth()) return;

            if (isDirty && currentFile && vditor) {
                if (confirm('当前文件有未保存的更改，是否先保存？')) {
                    saveCurrentFile().then(() => {
                        loadNewFile(node);
                    }).catch(() => {
                        loadNewFile(node);
                    });
                } else {
                    loadNewFile(node);
                }
            } else {
                loadNewFile(node);
            }
        }

        // 根据路径加载文件
        function loadFileByPath(filePath, fileName) {
            if (!checkAuth()) return;

            if (isDirty && currentFile && vditor) {
                if (confirm('当前文件有未保存的更改，是否先保存？')) {
                    saveCurrentFile().then(() => {
                        loadNewFileByPath(filePath, fileName);
                    }).catch(() => {
                        loadNewFileByPath(filePath, fileName);
                    });
                } else {
                    loadNewFileByPath(filePath, fileName);
                }
            } else {
                loadNewFileByPath(filePath, fileName);
            }
        }

        // 加载新文件
        function loadNewFile(node) {
            const filePath = buildFilePath(node);

            if (!filePath) {
                $('#vditor-container').html('<div class="error">无法构建文件路径</div>');
                return;
            }

            $('#file-title').text(`编辑文件: ${filePath}`);
            $('#vditor-container').html('<div class="loading">加载文件内容...</div>');
            $('#status-bar div:last-child').text('加载中...');

            const url = BASE_URL + `/api/files/${filePath}`;

            authAjax({
                url: url,
                method: 'GET',
                dataType: 'text'
            }).then(function (content) {
                currentFile = {
                    id: node.id,
                    name: node.text,
                    path: filePath
                };

                initEditor(content);
                $('#status-bar div:last-child').text('就绪');
                isDirty = false;
            }).catch(function (error) {
                if (error.status !== 401) { // 401错误已经在authAjax中处理
                    $('#vditor-container').html(
                        '<div class="error">加载文件失败: ' + (error.responseText || error.statusText || '未知错误') + '</div>'
                    );
                    $('#status-bar div:last-child').text('加载失败');
                }
            });
        }

        // 根据路径加载新文件
        function loadNewFileByPath(filePath, fileName) {
            $('#file-title').text(`编辑文件: ${filePath}`);
            $('#vditor-container').html('<div class="loading">加载文件内容...</div>');
            $('#status-bar div:last-child').text('加载中...');

            const url = BASE_URL + `/api/files/${filePath}`;

            authAjax({
                url: url,
                method: 'GET',
                dataType: 'text'
            }).then(function (content) {
                currentFile = {
                    id: 'search-' + filePath,
                    name: fileName,
                    path: filePath
                };

                initEditor(content);
                $('#status-bar div:last-child').text('就绪');
                isDirty = false;
            }).catch(function (error) {
                if (error.status !== 401) { // 401错误已经在authAjax中处理
                    $('#vditor-container').html(
                        '<div class="error">加载文件失败: ' + (error.responseText || error.statusText || '未知错误') + '</div>'
                    );
                    $('#status-bar div:last-child').text('加载失败');
                }
            });
        }

        // 更新搜索统计信息
        function updateSearchStats(count) {
            if (currentSearchTerm.length === 0) {
                $('#search-stats').text('');
            } else {
                $('#search-stats').text(`找到 ${count} 个匹配项`);
            }
        }

        // 构建文件路径
        function buildFilePath(node) {
            if (node.id === 'root') {
                return '';
            }

            let pathParts = [];
            let currentNode = node;

            while (currentNode && currentNode.id !== '#' && currentNode.id !== 'root') {
                if (currentNode.text && currentNode.text !== 'root') {
                    pathParts.unshift(currentNode.text);
                }
                if (currentNode.parent && currentNode.parent !== '#') {
                    currentNode = tree.jstree('get_node', currentNode.parent);
                } else {
                    break;
                }
            }

            if (pathParts.length === 0) {
                return node.text;
            }

            return pathParts.join('/');
        }

        // 初始化Vditor编辑器
        function initEditor(content) {
            if (vditor) {
                vditor.destroy();
                vditor = null;
            }

            $('#vditor-container').html('<div id="vditor"></div>');

            vditor = new Vditor('vditor', {
                height: '100%',
                value: content,
                cache: {
                    enable: false,
                },
                placeholder: '在此编辑文件内容...',
                toolbar: [
                    "emoji",
                    "headings",
                    "bold",
                    "italic",
                    "strike",
                    "link",
                    "|",
                    "list",
                    "ordered-list",
                    "check",
                    "outdent",
                    "indent",
                    "|",
                    "quote",
                    "line",
                    "code",
                    "inline-code",
                    "insert-before",
                    "insert-after",
                    "|",
                    "upload",
                    "record",
                    "table",
                    "|",
                    "undo",
                    "redo",
                    "|",
                    "edit-mode",
                    "content-theme",
                    "code-theme",
                    "export",
                    {
                        name: "more",
                        toolbar: [
                            "fullscreen",
                            "both",
                            "preview",
                            "info",
                            "help",
                        ],
                    }
                ],
                "outline": {
                    "enable": true,
                    "position": "right"
                },
                input: function (value) {
                    if (!isDirty) {
                        isDirty = true;
                        $('#status-bar div:last-child').text('已修改 (未保存)');
                    }
                },
                focus: function (value) {
                    startAutoSave();
                },
                blur: function (value) {
                    clearSaveInterval();
                },
                after: function () {
                    startAutoSave();
                }
            });

            isDirty = false;
        }

        // 启动自动保存
        function startAutoSave() {
            clearSaveInterval();

            saveInterval = setInterval(function () {
                if (isDirty && currentFile && vditor) {
                    saveCurrentFile();
                }
            }, 3000);
        }

        // 清除自动保存定时器
        function clearSaveInterval() {
            if (saveInterval) {
                clearInterval(saveInterval);
                saveInterval = null;
            }
        }

        // 保存当前文件
        function saveCurrentFile() {
            return new Promise((resolve, reject) => {
                if (!currentFile || !vditor) {
                    reject('没有文件可保存');
                    return;
                }

                const content = vditor.getValue();
                $('#status-bar div:last-child').text('保存中...');

                const url = BASE_URL + `/api/files/${currentFile.path}`;

                authAjax({
                    url: url,
                    method: 'POST',
                    contentType: 'text/plain',
                    data: content
                }).then(function () {
                    isDirty = false;
                    lastSaveTime = new Date();
                    $('#status-bar div:last-child').text('已保存 ' + lastSaveTime.toLocaleTimeString());
                    resolve();
                }).catch(function (error) {
                    if (error.status !== 401) { // 401错误已经在authAjax中处理
                        $('#status-bar div:last-child').text('保存失败: ' + (error.responseText || error.statusText || '未知错误'));
                    }
                    reject(error);
                });
            });
        }

        // 初始化拖动调整大小功能
        function initResizeHandler() {
            const resizeHandle = document.getElementById('resize-handle');
            const treeContainer = document.getElementById('tree-container');
            const mainContainer = document.querySelector('.main-container');
            let startX, startWidth;

            resizeHandle.addEventListener('mousedown', function (e) {
                isResizing = true;
                startX = e.clientX;
                startWidth = parseInt(document.defaultView.getComputedStyle(treeContainer).width, 10);
                resizeHandle.classList.add('active');

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                e.preventDefault();
            });

            function handleMouseMove(e) {
                if (!isResizing) return;

                const width = startWidth + e.clientX - startX;
                const maxWidth = mainContainer.offsetWidth * 0.5;

                if (width >= 200 && width <= maxWidth) {
                    treeContainer.style.width = width + 'px';

                    if (tree) {
                        tree.jstree('redraw');
                    }
                    if (vditor) {
                        setTimeout(() => {
                            vditor.resize();
                        }, 50);
                    }
                }
            }

            function handleMouseUp() {
                isResizing = false;
                resizeHandle.classList.remove('active');
                document.removeEventListener('mousemove', handleMouseMove);
                document.removeEventListener('mouseup', handleMouseUp);

                const width = parseInt(treeContainer.style.width, 10);
                if (width) {
                    localStorage.setItem('tree-container-width', width);
                }
            }

            const savedWidth = localStorage.getItem('tree-container-width');
            if (savedWidth) {
                treeContainer.style.width = savedWidth + 'px';
            }
        }

        // 手动保存快捷键
        $(document).on('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (currentFile && vditor) {
                    saveCurrentFile();
                }
            }
        });

        // 窗口关闭前提示保存
        window.addEventListener('beforeunload', function (e) {
            if (isDirty) {
                e.preventDefault();
                e.returnValue = '您有未保存的更改，确定要离开吗？';
                return '您有未保存的更改，确定要离开吗？';
            }
        });

        // 处理窗口大小变化
        $(window).on('resize', function () {
            if (tree) {
                tree.jstree('redraw');
            }
            if (vditor) {
                setTimeout(() => {
                    vditor.resize();
                }, 100);
            }
        });

        // 初始检查认证状态
        if (!checkAuth()) {
            handleUnauthorized();
        }
    });
</script>
</body>
</html>
