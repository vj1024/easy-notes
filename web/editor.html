<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyNotes</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/themes/default/style.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/vditor@3.11.2/dist/index.css"/>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary-color: #4361ee;
            --primary-light: #4895ef;
            --secondary-color: #3a0ca3;
            --accent-color: #f72585;
            --background-color: #f8f9fa;
            --surface-color: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #e0e0e0;
            --success-color: #4cc9f0;
            --warning-color: #f8961e;
            --error-color: #f72585;
            --sidebar-bg: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
            --header-bg: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
            --status-bg: linear-gradient(180deg, #e9ecef 0%, #dee2e6 100%);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-color: var(--background-color);
            color: var(--text-primary);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(67, 97, 238, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(58, 12, 163, 0.05) 0%, transparent 20%);
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            margin: 12px;
            background: var(--surface-color);
        }

        .tree-container {
            width: 28%;
            min-width: 280px;
            max-width: 40%;
            height: 100%;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            border-right: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            background-clip: padding-box;
        }

        .resize-handle {
            width: 10px;
            height: 100%;
            background: transparent;
            cursor: col-resize;
            position: absolute;
            right: -5px;
            top: 0;
            z-index: 10;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .resize-handle::after {
            content: "⋮";
            writing-mode: vertical-lr;
            letter-spacing: 3px;
            color: var(--text-secondary);
            opacity: 0.4;
            font-size: 14px;
        }

        .resize-handle:hover {
            background: var(--primary-color);
        }

        .resize-handle:hover::after {
            opacity: 1;
            color: white;
        }

        .resize-handle.active {
            background: var(--secondary-color);
        }

        .search-box {
            padding: 18px 15px 15px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: var(--surface-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
            transform: translateY(-1px);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px 5px;
            background: var(--surface-color);
        }

        .editor-container {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            min-width: 550px;
            background: var(--surface-color);
            overflow: hidden;
        }

        .file-info-bar {
            display: none;
        }

        .editor-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #vditor-container {
            flex: 1;
            overflow: auto;
            position: relative;
            background: var(--surface-color);
            height: 100%; /* 不再需要为顶部文件信息栏预留空间 */
        }

        .status-bar {
            padding: 10px 20px;
            background: var(--status-bg);
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-secondary);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Mono', 'Droid Sans Mono', monospace;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            height: 40px;
            max-height: 40px;
            overflow: hidden;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 16px;
        }

        .loading::before {
            content: "";
            display: block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(67, 97, 238, 0.2);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: var(--error-color);
            padding: 15px 20px;
            background: #fdecea;
            border-left: 4px solid var(--error-color);
            border-radius: 0 8px 8px 0;
            margin: 15px 20px;
            font-size: 14px;
            box-shadow: 0 2px 8px rgba(247, 37, 133, 0.1);
        }

        .no-file-selected {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 18px;
            flex-direction: column;
            text-align: center;
        }

        .no-file-selected::before {
            content: "📝";
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.7;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-stats {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 0 5px;
            text-align: center;
            font-style: italic;
        }

        #vditor {
            height: 100% !important;
            max-height: 100%;
        }

        .unauthorized {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            background: var(--background-color);
            padding: 20px;
        }

        .unauthorized-message {
            color: var(--error-color);
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 500;
        }

        .login-button {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .login-button:hover {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
        }

        .login-button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        /* JSTree 样式定制 */
        .jstree-default .jstree-clicked {
            background: rgba(67, 97, 238, 0.15) !important;
            border-radius: 4px;
            box-shadow: inset 0 0 1px var(--primary-color);
        }

        .jstree-default .jstree-hovered {
            background: rgba(67, 97, 238, 0.1) !important;
            border-radius: 4px;
            transition: background 0.2s ease;
        }

        .jstree-default .jstree-anchor {
            border-radius: 4px;
            margin: 1px 0;
            padding: 0 4px !important;
            height: 26px;
            line-height: 26px;
            font-size: 14px;
        }

        .jstree-default .jstree-icon {
            line-height: 26px;
            width: 20px;
            text-align: center;
        }

        .jstree-default .jstree-leaf > .jstree-ocl {
            cursor: pointer;
        }

        .jstree-default .jstree-wholerow {
            height: 26px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 10px;
            transition: background 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .tree-container {
                width: 32%;
                min-width: 250px;
            }

            .editor-container {
                min-width: 450px;
            }
        }

        @media (max-width: 992px) {
            .tree-container {
                width: 35%;
                min-width: 220px;
            }

            .editor-container {
                min-width: 400px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                margin: 5px;
            }

            .tree-container {
                width: 100%;
                height: 40%;
                min-height: 250px;
            }

            .editor-container {
                width: 100%;
                height: 60%;
                min-height: 300px;
            }

            .resize-handle {
                width: 100%;
                height: 10px;
                top: -5px;
                left: 0;
            }

            .resize-handle::after {
                writing-mode: horizontal-tb;
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="tree-container" id="tree-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 搜索文件名或内容...">
            <div class="search-stats" id="search-stats"></div>
        </div>
        <div id="file-tree">
            <div class="loading">加载文件树...</div>
        </div>
        <div class="resize-handle" id="resize-handle"></div>
    </div>

    <div class="editor-container">
        <div class="file-info-bar" id="file-info-bar">
            <div>
                <span id="file-title">未选择文件</span>
            </div>
        </div>
        <div class="editor-content">
            <div id="vditor-container">
                <div class="no-file-selected">请从左侧选择文件进行编辑</div>
            </div>
        </div>
        <div class="status-bar" id="status-bar">
            <div id="file-path-display">未选择文件</div>
            <div id="status-message">就绪</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/jstree.min.js"></script>
<script src="https://unpkg.com/vditor@3.11.2/dist/index.min.js"></script>
<script>
    $(function () {
        const BASE_URL = ""
        let currentSearchTerm = '';
        let searchTimeout = null;
        let vditor = null;
        let currentFile = null;
        let saveInterval = null;
        let isDirty = false;
        let lastSaveTime = null;
        let isResizing = false;

        // 初始化拖动调整大小功能
        initResizeHandler();

        // 检查认证状态
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                redirectToLogin();
                return false;
            }
            return true;
        }

        // 跳转到登录页
        function redirectToLogin() {
            window.location.href = '/login';
        }

        // 处理401错误
        function handleUnauthorized() {
            // 清空token
            localStorage.removeItem('token');

            // 显示未授权提示
            $('#vditor-container').html(`
                    <div class="unauthorized">
                        <div class="unauthorized-message">登录已过期，请重新登录</div>
                        <button class="login-button" id="login-button">前往登录</button>
                    </div>
                `);

            // 绑定登录按钮事件
            $('#login-button').on('click', function () {
                redirectToLogin();
            });

            // 禁用编辑器功能
            if (vditor) {
                vditor.destroy();
                vditor = null;
            }

            // 清除当前文件状态
            currentFile = null;
            isDirty = false;

            // 2秒后自动跳转
            setTimeout(redirectToLogin, 2000);
        }

        // 获取认证头
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return token ? {
                'Authorization': 'Bearer ' + token
            } : {};
        }

        // 带认证的AJAX请求
        function authAjax(options) {
            // 检查认证状态
            if (!checkAuth()) {
                return Promise.reject('未认证');
            }

            const token = localStorage.getItem('token');
            options.headers = options.headers || {};
            if (token) {
                options.headers['Authorization'] = 'Bearer ' + token;
            }

            return new Promise((resolve, reject) => {
                $.ajax({
                    ...options,
                    statusCode: {
                        401: function () {
                            handleUnauthorized();
                            reject('未授权');
                        }
                    },
                    success: function (data, textStatus, jqXHR) {
                        resolve(data, textStatus, jqXHR);
                    },
                    error: function (jqXHR, textStatus, errorThrown) {
                        if (jqXHR.status === 401) {
                            handleUnauthorized();
                        }
                        reject(jqXHR, textStatus, errorThrown);
                    }
                });
            });
        }

        // 更新搜索统计信息
        function updateSearchStats(count) {
            if (currentSearchTerm.length === 0) {
                $('#search-stats').text('');
            } else {
                $('#search-stats').text(`找到 ${count} 个匹配项`);
            }
        }

        // 初始化jstree
        const tree = $('#file-tree').jstree({
            'core': {
                'data': function (obj, callback) {
                    if (currentSearchTerm) {
                        // 如果有搜索词，使用搜索API
                        authAjax({
                            url: BASE_URL + '/api/files',
                            method: 'GET',
                            data: { search: currentSearchTerm },
                            dataType: 'json'
                        })
                        .then(function (data) {
                            if (data.results) {
                                // 使用搜索结果
                                callback.call(this, data.results);
                                // 更新搜索统计信息
                                updateSearchStats(data.results.length);

                                // 在数据加载完成后展开所有节点
                                setTimeout(function() {
                                    tree.jstree(true).open_all();
                                }, 100);
                            } else {
                                callback.call(this, []);
                                updateSearchStats(0);
                            }
                        })
                        .catch(function (error) {
                            if (error !== '未授权' && error.status !== 401) {
                                console.error('搜索失败:', error);
                                callback.call(this, []);
                                updateSearchStats(0);
                            }
                        });
                    } else {
                        // 否则使用正常的文件列表API
                        authAjax({
                            url: BASE_URL + '/api/files?list=true',
                            method: 'GET',
                            dataType: 'json'
                        })
                        .then(function (data) {
                            callback.call(this, data);
                            // 当不是搜索模式时，清空搜索统计
                            if (currentSearchTerm === '') {
                                $('#search-stats').text('');
                            }
                        })
                        .catch(function (error) {
                            if (error !== '未授权' && error.status !== 401) {
                                console.error('加载文件列表失败:', error);
                                callback.call(this, []);
                            }
                        });
                    }
                },
                'themes': {
                    'responsive': true,
                    'dots': true,
                    'icons': true
                },
                'error': function (xhr, status, error) {
                    if (xhr.status === 401) {
                        handleUnauthorized();
                    } else {
                        $('#file-tree').html('<div class="error">加载文件列表失败: ' + error + '</div>');
                    }
                }
            },
            'plugins': ['types'],
            'types': {
                'default': {
                    'icon': 'jstree-folder'
                },
                'file': {
                    'icon': 'jstree-file'
                }
            }
        });

        // 搜索功能
        $('#search-input').on('input', function () {
            const searchTerm = $(this).val().trim();
            currentSearchTerm = searchTerm;

            clearTimeout(searchTimeout);

            // 允许空格分隔的多个关键字，只要总长度大于0即可
            if (searchTerm.length > 0 && searchTerm.replace(/\s+/g, '').length < 2) {
                $('#search-stats').text('请输入至少2个有效字符');
                return;
            }

            // 延迟执行搜索，避免频繁请求
            searchTimeout = setTimeout(() => {
                // 重新加载树以应用搜索条件
                tree.jstree(true).refresh();

                if (searchTerm.length === 0) {
                    $('#search-stats').text('');
                } else {
                    $('#search-stats').text('搜索中...');
                }
            }, 300);
        });

        // 处理节点点击事件
        tree.on('select_node.jstree', function (e, data) {
            const node = data.node;

            if (node.type === 'file') {
                loadFileForEditing(node);
            } else {
                // 对于搜索结果，我们只处理文件，不处理文件夹
                if (node.path) {
                    // 这是一个搜索结果节点，直接加载文件
                    loadFileByPath(node.path, node.text);
                } else {
                    const filePath = buildFilePath(node);
                    $('#file-title').text(`文件夹: ${filePath}`);
                    $('#vditor-container').html('<div class="no-file-selected">请选择文件进行编辑</div>');
                    if (vditor) {
                        vditor.destroy();
                        vditor = null;
                    }
                    clearSaveInterval();
                    currentFile = null;
                    isDirty = false;
                }
            }
        });

        // 加载文件到编辑器
        function loadFileForEditing(node) {
            if (!checkAuth()) return;

            if (isDirty && currentFile && vditor) {
                if (confirm('当前文件有未保存的更改，是否先保存？')) {
                    saveCurrentFile().then(() => {
                        loadNewFile(node);
                    }).catch(() => {
                        loadNewFile(node);
                    });
                } else {
                    loadNewFile(node);
                }
            } else {
                loadNewFile(node);
            }
        }

        // 根据路径加载文件
        function loadFileByPath(filePath, fileName) {
            if (!checkAuth()) return;

            if (isDirty && currentFile && vditor) {
                if (confirm('当前文件有未保存的更改，是否先保存？')) {
                    saveCurrentFile().then(() => {
                        loadNewFileByPath(filePath, fileName);
                    }).catch(() => {
                        loadNewFileByPath(filePath, fileName);
                    });
                } else {
                    loadNewFileByPath(filePath, fileName);
                }
            } else {
                loadNewFileByPath(filePath, fileName);
            }
        }

        // 加载新文件
        function loadNewFile(node) {
            const filePath = buildFilePath(node);

            if (!filePath) {
                $('#vditor-container').html('<div class="error">无法构建文件路径</div>');
                return;
            }

            $('#file-path-display').text(`文件: ${filePath}`);
            $('#vditor-container').html('<div class="loading">加载文件内容...</div>');
            $('#status-message').text('加载中...');

            const url = BASE_URL + `/api/files/${filePath}`;

            authAjax({
                url: url,
                method: 'GET',
                dataType: 'text'
            }).then(function (content) {
                currentFile = {
                    id: node.id,
                    name: node.text,
                    path: filePath
                };

                // 从localStorage获取上次的滚动位置
                const savedPosition = getFileScrollPosition(filePath);

                initEditor(content, savedPosition);
                $('#status-message').text('就绪');
                isDirty = false;
            }).catch(function (error) {
                if (error.status !== 401) { // 401错误已经在authAjax中处理
                    $('#vditor-container').html(
                        '<div class="error">加载文件失败: ' + (error.responseText || error.statusText || '未知错误') + '</div>'
                    );
                    $('#status-message').text('加载失败');
                }
            });
        }

        // 根据路径加载新文件
        function loadNewFileByPath(filePath, fileName) {
            $('#file-path-display').text(`文件: ${filePath}`);
            $('#vditor-container').html('<div class="loading">加载文件内容...</div>');
            $('#status-message').text('加载中...');

            const url = BASE_URL + `/api/files/${filePath}`;

            authAjax({
                url: url,
                method: 'GET',
                dataType: 'text'
            }).then(function (content) {
                currentFile = {
                    id: 'search-' + filePath,
                    name: fileName,
                    path: filePath
                };

                // 从localStorage获取上次的滚动位置
                const savedPosition = getFileScrollPosition(filePath);

                initEditor(content, savedPosition);
                $('#status-message').text('就绪');
                isDirty = false;
            }).catch(function (error) {
                if (error.status !== 401) { // 401错误已经在authAjax中处理
                    $('#vditor-container').html(
                        '<div class="error">加载文件失败: ' + (error.responseText || error.statusText || '未知错误') + '</div>'
                    );
                    $('#status-message').text('加载失败');
                }
            });
        }

        // 更新搜索统计信息
        function updateSearchStats(count) {
            if (currentSearchTerm.length === 0) {
                $('#search-stats').text('');
            } else {
                $('#search-stats').text(`找到 ${count} 个匹配项`);
            }
        }

        // 构建文件路径
        function buildFilePath(node) {
            if (node.id === 'root') {
                return '';
            }

            let pathParts = [];
            let currentNode = node;

            while (currentNode && currentNode.id !== '#' && currentNode.id !== 'root') {
                if (currentNode.text && currentNode.text !== 'root') {
                    pathParts.unshift(currentNode.text);
                }
                if (currentNode.parent && currentNode.parent !== '#') {
                    currentNode = tree.jstree('get_node', currentNode.parent);
                } else {
                    break;
                }
            }

            if (pathParts.length === 0) {
                return node.text;
            }

            return pathParts.join('/');
        }

        // 保存文件滚动位置到localStorage
        function saveFileScrollPosition(filePath) {
            if (!vditor || !filePath) return;

            try {
                const positionData = {
                    previewScrollTop: 0,
                    irScrollTop: 0,
                    svScrollTop: 0,
                    wysiwygScrollTop: 0,
                    timestamp: Date.now()
                };

                // 获取各种模式下的滚动位置
                if (vditor.vditor && vditor.vditor.preview && vditor.vditor.preview.element) {
                    positionData.previewScrollTop = vditor.vditor.preview.element.scrollTop;
                }

                if (vditor.vditor && vditor.vditor.ir && vditor.vditor.ir.element) {
                    positionData.irScrollTop = vditor.vditor.ir.element.scrollTop;
                }

                if (vditor.vditor && vditor.vditor.sv && vditor.vditor.sv.element) {
                    positionData.svScrollTop = vditor.vditor.sv.element.scrollTop;
                }

                if (vditor.vditor && vditor.vditor.wysiwyg && vditor.vditor.wysiwyg.element) {
                    positionData.wysiwygScrollTop = vditor.vditor.wysiwyg.element.scrollTop;
                }

                // 存储到localStorage
                const key = `file_scroll_position_${filePath}`;
                localStorage.setItem(key, JSON.stringify(positionData));
            } catch (e) {
                console.warn('无法保存滚动位置:', e);
            }
        }

        // 从localStorage获取文件滚动位置
        function getFileScrollPosition(filePath) {
            if (!filePath) return null;

            try {
                const key = `file_scroll_position_${filePath}`;
                const stored = localStorage.getItem(key);

                if (stored) {
                    return JSON.parse(stored);
                }
            } catch (e) {
                console.warn('无法获取滚动位置:', e);
            }

            return null;
        }

        // 初始化Vditor编辑器
        function initEditor(content, savedPosition = null) {
            if (vditor) {
                vditor.destroy();
                vditor = null;
            }

            $('#vditor-container').html('<div id="vditor"></div>');

            vditor = new Vditor('vditor', {
                height: '100%',
                value: content,
                cache: {
                    enable: false,
                },
                placeholder: '在此编辑文件内容...',
                toolbar: [
                    "emoji",
                    "headings",
                    "bold",
                    "italic",
                    "strike",
                    "link",
                    "|",
                    "list",
                    "ordered-list",
                    "check",
                    "outdent",
                    "indent",
                    "|",
                    "quote",
                    "line",
                    "code",
                    "inline-code",
                    "insert-before",
                    "insert-after",
                    "|",
                    "upload",
                    "record",
                    "table",
                    "|",
                    "undo",
                    "redo",
                    "|",
                    "edit-mode",
                    "content-theme",
                    "code-theme",
                    "export",
                    {
                        name: "more",
                        toolbar: [
                            "fullscreen",
                            "both",
                            "preview",
                            "info",
                            "help",
                        ],
                    }
                ],
                toolbarConfig: {
                    pin: true,
                },
                cache: {
                    enable: false,
                },
                theme: {
                    current: 'classic',
                    path: 'https://unpkg.com/vditor@3.11.2/dist/css/content-theme',
                },
                "outline": {
                    "enable": true,
                    "position": "right"
                },
                input: function (value) {
                    if (!isDirty) {
                        isDirty = true;
                        $('#status-bar div:last-child').text('已修改 (未保存)');
                    }

                    // 保存滚动位置
                    if (currentFile && currentFile.path) {
                        saveFileScrollPosition(currentFile.path);
                    }
                },
                focus: function (value) {
                    startAutoSave();
                },
                blur: function (value) {
                    clearSaveInterval();

                    // 保存滚动位置
                    if (currentFile && currentFile.path) {
                        saveFileScrollPosition(currentFile.path);
                    }
                },
                after: function () {
                    startAutoSave();

                    // 如果有保存的位置，恢复滚动位置
                    if (savedPosition && vditor) {
                        setTimeout(() => {
                            try {
                                // 尝试滚动到保存的位置
                                const previewElement = vditor.vditor.preview.element;
                                if (previewElement) {
                                    previewElement.scrollTop = savedPosition.previewScrollTop || 0;
                                }

                                // 对于编辑模式，滚动到指定行
                                const irElement = vditor.vditor.ir.element;
                                if (irElement && savedPosition.irScrollTop) {
                                    irElement.scrollTop = savedPosition.irScrollTop;
                                }

                                const svElement = vditor.vditor.sv.element;
                                if (svElement && savedPosition.svScrollTop) {
                                    svElement.scrollTop = savedPosition.svScrollTop;
                                }

                                const wysiwygElement = vditor.vditor.wysiwyg.element;
                                if (wysiwygElement && savedPosition.wysiwygScrollTop) {
                                    wysiwygElement.scrollTop = savedPosition.wysiwygScrollTop;
                                }
                            } catch (e) {
                                console.warn('无法恢复滚动位置:', e);
                            }
                        }, 100);
                    }

                    // 添加滚动监听器
                    if (window.addScrollListeners) {
                        window.addScrollListeners();
                    }
                },
                // 监听滚动事件以保存滚动位置
                resize: function() {
                    if (currentFile && currentFile.path) {
                        saveFileScrollPosition(currentFile.path);
                    }
                }
            });

            isDirty = false;
        }

        // 启动自动保存
        function startAutoSave() {
            clearSaveInterval();

            saveInterval = setInterval(function () {
                if (isDirty && currentFile && vditor) {
                    saveCurrentFile();
                }
            }, 3000);
        }

        // 清除自动保存定时器
        function clearSaveInterval() {
            if (saveInterval) {
                clearInterval(saveInterval);
                saveInterval = null;
            }
        }

        // 保存当前文件
        function saveCurrentFile() {
            return new Promise((resolve, reject) => {
                if (!currentFile || !vditor) {
                    reject('没有文件可保存');
                    return;
                }

                const content = vditor.getValue();
                $('#status-bar div:last-child').text('保存中...');

                const url = BASE_URL + `/api/files/${currentFile.path}`;

                authAjax({
                    url: url,
                    method: 'POST',
                    contentType: 'text/plain',
                    data: content
                }).then(function () {
                    isDirty = false;
                    lastSaveTime = new Date();
                    $('#status-bar div:last-child').text('已保存 ' + lastSaveTime.toLocaleTimeString());
                    resolve();
                }).catch(function (error) {
                    if (error.status !== 401) { // 401错误已经在authAjax中处理
                        $('#status-bar div:last-child').text('保存失败: ' + (error.responseText || error.statusText || '未知错误'));
                    }
                    reject(error);
                });
            });
        }

        // 初始化拖动调整大小功能
        function initResizeHandler() {
            const resizeHandle = document.getElementById('resize-handle');
            const treeContainer = document.getElementById('tree-container');
            const mainContainer = document.querySelector('.main-container');
            let startX, startWidth;

            resizeHandle.addEventListener('mousedown', function (e) {
                isResizing = true;
                startX = e.clientX;
                startWidth = parseInt(document.defaultView.getComputedStyle(treeContainer).width, 10);
                resizeHandle.classList.add('active');

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);

                e.preventDefault();
            });

            function handleMouseMove(e) {
                if (!isResizing) return;

                const width = startWidth + e.clientX - startX;
                const maxWidth = mainContainer.offsetWidth * 0.5;

                if (width >= 200 && width <= maxWidth) {
                    treeContainer.style.width = width + 'px';

                    if (tree) {
                        tree.jstree('redraw');
                    }
                    if (vditor) {
                        setTimeout(() => {
                            vditor.resize();
                        }, 50);
                    }
                }
            }

            function handleMouseUp() {
                isResizing = false;
                resizeHandle.classList.remove('active');
                document.removeEventListener('mousemove', handleMouseMove);
                document.removeEventListener('mouseup', handleMouseUp);

                const width = parseInt(treeContainer.style.width, 10);
                if (width) {
                    localStorage.setItem('tree-container-width', width);
                }
            }

            const savedWidth = localStorage.getItem('tree-container-width');
            if (savedWidth) {
                treeContainer.style.width = savedWidth + 'px';
            }
        }

        // 手动保存快捷键
        $(document).on('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (currentFile && vditor) {
                    saveCurrentFile();
                }
            }
        });

        // 监听编辑器区域的滚动事件以保存滚动位置
        function setupScrollListener() {
            // 使用节流函数减少保存频率
            let scrollTimeout;

            // 由于Vditor有自己的滚动容器，我们需要在编辑器初始化后添加滚动监听器
            function addScrollListeners() {
                if (!vditor) return;

                // 获取Vditor的各种模式的滚动容器
                const elementsToWatch = [
                    vditor.vditor?.preview?.element,
                    vditor.vditor?.ir?.element,
                    vditor.vditor?.sv?.element,
                    vditor.vditor?.wysiwyg?.element
                ];

                elementsToWatch.forEach(element => {
                    if (element) {
                        element.addEventListener('scroll', function() {
                            if (scrollTimeout) {
                                clearTimeout(scrollTimeout);
                            }

                            scrollTimeout = setTimeout(() => {
                                if (currentFile && currentFile.path) {
                                    saveFileScrollPosition(currentFile.path);
                                }
                            }, 500); // 每500毫秒保存一次
                        }, { passive: true });
                    }
                });
            }

            // 暴露给外部调用
            window.addScrollListeners = addScrollListeners;
        }

        // 窗口关闭前保存滚动位置和提示保存
        window.addEventListener('beforeunload', function (e) {
            // 保存当前文件的滚动位置
            if (currentFile && currentFile.path) {
                saveFileScrollPosition(currentFile.path);
            }

            if (isDirty) {
                e.preventDefault();
                e.returnValue = '您有未保存的更改，确定要离开吗？';
                return '您有未保存的更改，确定要离开吗？';
            }
        });

        // 初始化滚动监听器
        setupScrollListener();

        // 处理窗口大小变化
        $(window).on('resize', function () {
            if (tree) {
                tree.jstree('redraw');
            }
            if (vditor) {
                setTimeout(() => {
                    vditor.resize();
                }, 100);
            }
        });

        // 初始检查认证状态
        if (!checkAuth()) {
            handleUnauthorized();
        }
    });
</script>
